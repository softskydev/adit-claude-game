<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkir Pintar — Kuis Aturan Lalu Lintas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#eaf4ff;
    --panel:#ffffff;
    --ink:#1f2937;
    --muted:#64748b;
    --blue:#2f6fed;
    --blue-dark:#1d4fbf;
    --amber:#ffb703;
    --amber-dark:#c98600;
    --green:#2ecc71;
    --green-dark:#1f9d57;
    --red:#e63946;
    --red-dark:#b3222d;
    --asphalt:#454d57;
    --asphalt-dark:#2a2e34;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,#cfe6ff 0%, var(--sky) 45%);
    color:var(--ink);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  h1,h2,h3,.btn{font-family:'Baloo 2',cursive}

  .game{
    width:min(680px,100%);
    background:var(--panel);
    border:4px solid var(--blue-dark);
    border-radius:24px;
    box-shadow:0 12px 0 var(--asphalt-dark), 0 20px 40px rgba(29,79,191,.25);
    overflow:hidden;
  }

  /* ===== HEADER ===== */
  .header{
    background:var(--blue);
    color:#fff;
    padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    border-bottom:4px solid var(--asphalt-dark);
  }
  .header h1{font-size:clamp(18px,4vw,24px);line-height:1.2}
  .header .sub{font-size:12px;opacity:.9;font-weight:600}
  .scoreboard{
    background:rgba(255,255,255,.18);
    border:2px solid rgba(255,255,255,.5);
    border-radius:14px;
    padding:6px 14px;
    text-align:center;
    font-weight:800;
    min-width:92px;
  }
  .scoreboard small{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;opacity:.85}
  .scoreboard b{font-size:20px}

  .stage{padding:24px 24px 28px}

  .btn{
    border:none;cursor:pointer;
    background:var(--amber);
    color:var(--ink);
    font-size:16px;font-weight:800;
    padding:13px 30px;
    border-radius:16px;
    border-bottom:5px solid var(--amber-dark);
    transition:transform .1s, border-bottom-width .1s;
    width:100%;
  }
  .btn:hover{transform:translateY(1px)}
  .btn:active{transform:translateY(4px);border-bottom-width:1px}
  .btn:focus-visible{outline:3px dashed var(--blue);outline-offset:3px}
  .btn-green{background:var(--green);color:#fff;border-bottom-color:var(--green-dark)}

  /* ===== PROGRESS ===== */
  .progress{
    display:flex;align-items:center;gap:10px;
    margin-bottom:14px;font-weight:800;font-size:13px;color:var(--muted);
  }
  .bar{flex:1;height:12px;background:#e6edf7;border-radius:99px;overflow:hidden;border:2px solid #d3ddec}
  .bar i{display:block;height:100%;background:var(--blue);border-radius:99px;transition:width .4s ease}

  /* ===== SCENE (parking lot) ===== */
  .scene{
    position:relative;height:200px;border-radius:16px;overflow:hidden;
    background:linear-gradient(180deg,#5b6470 0%, var(--asphalt) 65%, var(--asphalt-dark) 100%);
    border:3px solid var(--asphalt-dark);
    margin-bottom:18px;
  }
  .scene.shake{animation:sceneShake .5s}
  @keyframes sceneShake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(5px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(3px)}
  }

  .bays{position:absolute;top:14px;left:4%;right:4%;height:118px;display:flex}
  .bay{
    flex:1;position:relative;display:flex;align-items:flex-start;justify-content:center;
    padding-top:8px;border-left:3px dashed rgba(255,255,255,.55);
  }
  .bay:last-child{border-right:3px dashed rgba(255,255,255,.55)}
  .bay .parked{font-size:36px;opacity:.92;filter:drop-shadow(0 4px 4px rgba(0,0,0,.4))}
  .bay.target{outline:3px dashed var(--amber);outline-offset:-6px;border-radius:8px}
  .bay.target .marker{
    font-family:'Baloo 2',cursive;font-weight:800;font-size:32px;color:rgba(255,255,255,.4);
    animation:pulseP 1.4s ease-in-out infinite;
  }
  @keyframes pulseP{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.1)}}

  #playerCar{
    position:absolute;left:50%;bottom:30px;font-size:44px;
    transform:translate(-50%,0) rotate(0deg);
    transition:transform 1s cubic-bezier(.4,0,.2,1);
    filter:drop-shadow(0 6px 6px rgba(0,0,0,.4));
    z-index:5;
  }
  .curb{
    position:absolute;left:0;right:0;bottom:0;height:22px;
    background:repeating-linear-gradient(45deg,var(--red) 0 14px, #fff 14px 28px);
    border-top:3px solid var(--red-dark);
  }
  .impact{position:absolute;font-size:36px;pointer-events:none;animation:impactPop .6s ease-out forwards;z-index:6}
  @keyframes impactPop{
    0%{opacity:0;transform:scale(.3) rotate(0)}
    30%{opacity:1;transform:scale(1.3) rotate(15deg)}
    100%{opacity:0;transform:scale(1.6) rotate(25deg) translateY(6px)}
  }
  .badge-ok{position:absolute;font-size:28px;pointer-events:none;animation:twinkle .9s ease-in-out infinite;z-index:6}
  @keyframes twinkle{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}

  /* ===== QUESTION / ANSWERS ===== */
  .question{
    background:#f4f8ff;
    border:3px dashed var(--blue);
    border-radius:16px;
    padding:16px 18px;
    font-size:clamp(15px,3vw,17px);
    font-weight:800;
    margin-bottom:18px;
  }
  .answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ans{
    background:#fff;
    border:3px solid var(--blue-dark);
    border-radius:14px;
    padding:14px 16px;
    font-family:'Nunito',sans-serif;
    font-weight:700;font-size:14.5px;
    text-align:left;cursor:pointer;
    display:flex;gap:10px;align-items:flex-start;
    transition:transform .1s, background .15s;
  }
  .ans:hover{background:#eaf1ff;transform:translateY(-2px)}
  .ans:focus-visible{outline:3px dashed var(--blue);outline-offset:2px}
  .ans .letter{
    flex:none;width:26px;height:26px;
    background:var(--amber);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',cursive;font-weight:800;
  }
  .ans:disabled{cursor:default;opacity:.85}
  .ans.correct{background:#d9f5e3;border-color:var(--green)}
  .ans.correct .letter{background:var(--green);color:#fff}
  .ans.wrong{background:#ffe0da;border-color:var(--red)}
  .ans.wrong .letter{background:var(--red);color:#fff}

  /* ===== POPUP ===== */
  .popup-overlay{
    position:absolute;inset:0;background:rgba(15,20,28,.55);
    display:none;align-items:center;justify-content:center;padding:16px;z-index:20;
  }
  .popup-overlay.show{display:flex;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  .popup-card{
    background:#fff;border-radius:16px;padding:22px 24px;text-align:center;
    max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3);
  }
  .popup-card .icon{font-size:50px;margin-bottom:4px}
  .popup-card h3{font-size:21px;margin-bottom:8px}
  .popup-card h3.good{color:var(--green-dark)}
  .popup-card h3.bad{color:var(--red-dark)}
  .popup-card p{font-size:13.5px;color:#555;font-weight:600;margin-bottom:14px;line-height:1.45}

  /* ===== FINAL ===== */
  .final{display:none;align-items:center;justify-content:center;text-align:center;gap:14px;flex-direction:column;min-height:420px}
  .final .big{font-size:76px}
  .final h2{font-size:clamp(22px,5vw,28px);color:var(--blue-dark)}
  .stars{font-size:32px;letter-spacing:6px}
  .final-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .stat{background:#fff;border:3px solid var(--blue-dark);border-radius:14px;padding:10px 20px;font-weight:800}
  .stat small{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .stat b{font-size:22px}
  .final p.msg{font-weight:700;color:var(--muted);max-width:46ch}
  .final .btn{max-width:220px}

  @media (max-width:560px){
    .answers{grid-template-columns:1fr}
    .stage{padding:18px 16px 22px}
    .header{flex-wrap:wrap}
    .scene{height:190px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>

<div class="game">
  <div class="header">
    <div>
      <h1>🚗 Parkir Pintar</h1>
      <div class="sub">Jawab benar → parkir mulus! Jawab salah → nabrak trotoar!</div>
    </div>
    <div class="scoreboard">
      <small>Skor</small>
      <b id="gameScore">0</b>
    </div>
  </div>

  <div class="stage">
    <div id="quizWrap">
      <div class="progress">
        <span id="progressText">Soal 1/10</span>
        <div class="bar"><i id="progressBar" style="width:0%"></i></div>
      </div>

      <div class="scene" id="scene">
        <div class="bays" id="bays"></div>
        <span id="playerCar">🚗</span>
        <div class="curb" id="curb"></div>

        <div class="popup-overlay" id="popupOverlay">
          <div class="popup-card">
            <div class="icon" id="popupIcon">✅</div>
            <h3 id="popupTitle">Jawaban Benar!</h3>
            <p id="popupExplain">Penjelasan…</p>
            <button class="btn btn-green" id="popupBtn" onclick="nextQuestion()">Lanjut ➜</button>
          </div>
        </div>
      </div>

      <div class="question" id="questionText">Pertanyaan…</div>
      <div class="answers" id="answers"></div>
    </div>

    <div class="final" id="screenFinal">
      <div class="big" id="finalEmoji">🏆</div>
      <h2 id="finalTitle">Master Parkir Sejati!</h2>
      <div class="stars" id="finalStars">⭐⭐⭐</div>
      <div class="final-stats">
        <div class="stat"><small>Parkir Sukses</small><b id="statParked">0</b></div>
        <div class="stat"><small>Nabrak</small><b id="statCrashed">0</b></div>
        <div class="stat"><small>Skor Akhir</small><b id="statScore">0</b></div>
      </div>
      <p class="msg" id="finalMsg"></p>
      <button class="btn btn-green" onclick="restart()">🔄 Main Lagi</button>
    </div>
  </div>
</div>

<script>
/* ================== DATA ================== */
const QUESTIONS = [
  {
    q: 'Rambu lingkaran biru dengan huruf "P" dicoret garis merah artinya?',
    a: ["Dilarang berhenti", "Dilarang parkir", "Wajib parkir", "Parkir gratis"],
    correct: 1,
    explain: 'Rambu "P" dicoret merah adalah larangan parkir — kendaraan tidak boleh berhenti dalam waktu lama di area tersebut.'
  },
  {
    q: "Sebelum bermanuver untuk parkir, sebaiknya kamu terlebih dahulu?",
    a: ["Langsung banting setir", "Menyalakan lampu sein dan memastikan area sekitar aman", "Membunyikan klakson panjang", "Mempercepat laju kendaraan"],
    correct: 1,
    explain: "Nyalakan sein dan pastikan sekitar aman sebelum bermanuver agar pengendara lain tahu dan tidak terjadi tabrakan."
  },
  {
    q: "Bolehkah parkir tepat di depan pintu masuk gedung atau jalur pemadam kebakaran?",
    a: ["Boleh asal sebentar", "Boleh jika tidak ada yang melihat", "Tidak boleh, karena menghalangi akses darurat", "Boleh jika membayar tukang parkir"],
    correct: 2,
    explain: "Area di depan akses darurat/hydrant harus selalu bebas hambatan untuk kendaraan pemadam kebakaran atau ambulans."
  },
  {
    q: "Garis kuning zig-zag di pinggir jalan menandakan?",
    a: ["Tempat parkir favorit", "Dilarang berhenti maupun parkir di area tersebut", "Batas kecepatan", "Jalur sepeda"],
    correct: 1,
    explain: "Garis kuning zig-zag biasanya menandai larangan berhenti karena dekat pintu keluar-masuk seperti gerbang sekolah atau kantor."
  },
  {
    q: 'Rambu lingkaran biru dengan huruf "S" dicoret merah artinya?',
    a: ["Dilarang parkir tapi boleh berhenti sebentar", "Dilarang berhenti sama sekali, termasuk menurunkan penumpang", "Wajib berhenti", "Batas kecepatan minimum"],
    correct: 1,
    explain: '"S" dicoret berarti dilarang berhenti sama sekali (No Stopping), berbeda dengan "P" dicoret yang masih boleh berhenti sebentar untuk menurunkan penumpang.'
  },
  {
    q: "Ketika parkir di tanjakan, agar mobil tidak meluncur sebaiknya?",
    a: ["Posisi gigi netral tanpa rem tangan", "Gunakan rem tangan dan masukkan gigi rendah", "Ganjal ban dengan batu saja tanpa rem tangan", "Matikan mesin dalam posisi gigi netral"],
    correct: 1,
    explain: "Kombinasi rem tangan aktif dan gigi rendah (atau posisi P pada matic) mencegah mobil meluncur saat diparkir di tanjakan atau turunan."
  },
  {
    q: "Slot parkir khusus disabilitas sedang kosong padahal parkiran penuh, dan mobilmu tidak membawa penumpang disabilitas. Sebaiknya?",
    a: ["Parkir saja karena kosong", "Tetap mencari slot lain karena itu hak prioritas penyandang disabilitas", "Parkir lalu pindah kalau ada yang komplain", "Meminta orang lain berpura-pura disabilitas"],
    correct: 1,
    explain: "Slot disabilitas adalah fasilitas prioritas yang dilindungi aturan; gunakan hanya jika berhak agar tidak menghalangi yang membutuhkan."
  },
  {
    q: "Saat parkir mundur (parkir paralel), cara paling aman adalah?",
    a: ["Hanya mengandalkan spion tanpa menoleh", "Menoleh langsung ke belakang, gunakan spion, dan kamera/sensor jika ada", "Menutup mata karena sudah hafal", "Meminta orang lain menyetir dari kursi belakang"],
    correct: 1,
    explain: "Kombinasi menoleh langsung, spion, dan sensor/kamera parkir memberi pandangan penuh terhadap objek sekitar agar parkir aman."
  },
  {
    q: "Jika area parkir penuh, tindakan yang benar adalah?",
    a: ["Parkir di bahu jalan sembarangan hingga menghalangi lalu lintas", "Mencari area parkir resmi lain atau menunggu slot kosong", "Menaikkan roda ke trotoar pejalan kaki", "Meminta petugas mengusir mobil lain agar dapat tempat"],
    correct: 1,
    explain: "Trotoar adalah hak pejalan kaki dan bahu jalan sembarangan mengganggu lalu lintas — carilah tempat parkir resmi lain atau tunggu slot kosong."
  },
  {
    q: "Setelah mobil terparkir dengan benar, langkah terakhir yang wajib dilakukan adalah?",
    a: ["Meninggalkan mobil dalam keadaan menyala", "Memastikan rem tangan aktif, gigi pada posisi aman, dan mengunci mobil", "Membuka semua jendela lebar-lebar", "Meninggalkan kunci di dalam mobil"],
    correct: 1,
    explain: "Rem tangan/gigi parkir aktif mencegah mobil bergerak, dan mengunci mobil menjaga keamanan kendaraan serta barang di dalamnya."
  }
];

const CAR_EMOJIS = ["🚙","🚕","🚐","🚓","🛻"];
const BAY_COUNT = 5;

/* ================== STATE ================== */
let order = 0, score = 0, parked = 0, crashed = 0;
let shuffledQ = [];
let currentBayIndex = 0;

/* ================== HELPERS ================== */
const $ = id => document.getElementById(id);
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ================== FLOW ================== */
function init(){
  shuffledQ = shuffle(QUESTIONS);
  order = 0; score = 0; parked = 0; crashed = 0;
  $('gameScore').textContent = 0;
  $('quizWrap').style.display = 'block';
  $('screenFinal').style.display = 'none';
  showQuestion();
}

function buildBays(){
  currentBayIndex = Math.floor(Math.random() * BAY_COUNT);
  const baysEl = $('bays');
  baysEl.innerHTML = '';
  for(let i = 0; i < BAY_COUNT; i++){
    const bay = document.createElement('div');
    bay.id = 'bay-' + i;
    bay.className = 'bay' + (i === currentBayIndex ? ' target' : '');
    if(i === currentBayIndex){
      bay.innerHTML = '<span class="marker">P</span>';
    } else {
      const emoji = CAR_EMOJIS[Math.floor(Math.random() * CAR_EMOJIS.length)];
      bay.innerHTML = `<span class="parked">${emoji}</span>`;
    }
    baysEl.appendChild(bay);
  }
}

function resetCar(){
  const car = $('playerCar');
  car.style.transition = 'none';
  car.style.transform = 'translate(-50%,0) rotate(0deg)';
  car.classList.remove('crashed','parked');
  void car.offsetWidth;
  car.style.transition = '';
  document.querySelectorAll('#scene .impact, #scene .badge-ok').forEach(e => e.remove());
  $('scene').classList.remove('shake');
}

function showQuestion(){
  const q = shuffledQ[order];
  $('progressText').textContent = `Soal ${order + 1}/${shuffledQ.length}`;
  $('progressBar').style.width = (order / shuffledQ.length * 100) + '%';

  buildBays();
  resetCar();

  $('questionText').textContent = q.q;

  const idxOrder = shuffle([0,1,2,3]);
  const box = $('answers');
  box.innerHTML = '';
  idxOrder.forEach((ai, pos) => {
    const btn = document.createElement('button');
    btn.className = 'ans';
    btn.innerHTML = `<span class="letter">${'ABCD'[pos]}</span><span>${q.a[ai]}</span>`;
    btn.onclick = () => handleAnswer(btn, ai === q.correct, q);
    box.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, q){
  document.querySelectorAll('.ans').forEach(b => {
    b.disabled = true;
    const txt = b.textContent.slice(1);
    if(txt.trim() === q.a[q.correct].trim()) b.classList.add('correct');
  });
  if(!isCorrect) btn.classList.add('wrong');

  if(isCorrect) animatePark(); else animateCrash();

  setTimeout(() => showPopup(isCorrect, q), 1050);
}

function animatePark(){
  const car = $('playerCar');
  const scene = $('scene');
  const bay = document.getElementById('bay-' + currentBayIndex);
  const sceneRect = scene.getBoundingClientRect();
  const carRect = car.getBoundingClientRect();
  const bayRect = bay.getBoundingClientRect();

  const dx = (bayRect.left + bayRect.width / 2) - (carRect.left + carRect.width / 2);
  const dy = (bayRect.top + bayRect.height / 2) - (carRect.top + carRect.height / 2);

  car.style.transition = 'transform 1s cubic-bezier(.4,0,.2,1)';
  car.style.transform = `translate(calc(-50% + ${dx}px), ${dy}px) scale(.72)`;
  car.classList.add('parked');

  setTimeout(() => {
    const badge = document.createElement('span');
    badge.className = 'badge-ok';
    badge.textContent = '✅';
    badge.style.left = (bayRect.left - sceneRect.left + bayRect.width / 2 - 14) + 'px';
    badge.style.top = (bayRect.top - sceneRect.top - 8) + 'px';
    scene.appendChild(badge);
  }, 950);
}

function animateCrash(){
  const car = $('playerCar');
  const scene = $('scene');
  const curb = $('curb');
  const sceneRect = scene.getBoundingClientRect();
  const carRect = car.getBoundingClientRect();
  const curbRect = curb.getBoundingClientRect();

  const dir = Math.random() > 0.5 ? 1 : -1;
  const dx = dir * (30 + Math.random() * 40);
  const dy = (curbRect.top - carRect.top) - 6;

  car.style.transition = 'transform .55s cubic-bezier(.3,.6,.4,1.4)';
  car.style.transform = `translate(calc(-50% + ${dx}px), ${dy}px) rotate(${dir * 20}deg)`;
  car.classList.add('crashed');

  setTimeout(() => {
    scene.classList.add('shake');
    const carRect2 = car.getBoundingClientRect();
    const impact = document.createElement('span');
    impact.className = 'impact';
    impact.textContent = '💥';
    impact.style.left = (carRect2.left - sceneRect.left + carRect2.width / 2 - 18) + 'px';
    impact.style.top = (carRect2.top - sceneRect.top - 8) + 'px';
    scene.appendChild(impact);
  }, 500);
}

function showPopup(isCorrect, q){
  if(isCorrect){ score += 100; parked++; } else { crashed++; }
  $('gameScore').textContent = score;

  $('popupIcon').textContent = isCorrect ? '✅' : '💥';
  const t = $('popupTitle');
  t.textContent = isCorrect ? 'Jawaban Benar!' : 'Jawaban Salah!';
  t.className = isCorrect ? 'good' : 'bad';
  $('popupExplain').textContent = isCorrect
    ? '🎉 ' + q.explain
    : '❌ Jawaban yang benar: "' + q.a[q.correct] + '". ' + q.explain;
  $('popupBtn').textContent = (order + 1 >= shuffledQ.length) ? 'Lihat Hasil Akhir 🏁' : 'Lanjut ➜';

  $('popupOverlay').classList.add('show');
}

function nextQuestion(){
  $('popupOverlay').classList.remove('show');
  order++;
  if(order >= shuffledQ.length){ finish(); } else { showQuestion(); }
}

function finish(){
  $('quizWrap').style.display = 'none';
  const final = $('screenFinal');
  final.style.display = 'flex';

  $('statParked').textContent = parked;
  $('statCrashed').textContent = crashed;
  $('statScore').textContent = score;

  const ratio = parked / shuffledQ.length;
  let emoji, title, stars, msg;
  if(ratio === 1){
    emoji = '🏆'; title = 'Master Parkir Sejati!'; stars = '⭐⭐⭐⭐⭐';
    msg = 'Sempurna! Semua parkir mulus tanpa menabrak apapun. Kamu benar-benar paham aturan berkendara!';
  } else if(ratio >= .75){
    emoji = '🚗'; title = 'Pengemudi Andal!'; stars = '⭐⭐⭐⭐';
    msg = 'Kerja bagus! Hampir semua parkir sukses. Sedikit lagi menuju Master Parkir!';
  } else if(ratio >= .5){
    emoji = '🅿️'; title = 'Pengemudi Pemula'; stars = '⭐⭐⭐';
    msg = 'Lumayan, tapi masih beberapa kali menabrak trotoar. Yuk pelajari lagi rambu & etika parkirnya!';
  } else {
    emoji = '🚧'; title = 'Waduh, Banyak Nabrak!'; stars = '⭐';
    msg = 'Banyak parkir gagal! Jangan menyerah, pelajari lagi aturan lalu lintas dan coba lagi ya!';
  }
  $('finalEmoji').textContent = emoji;
  $('finalTitle').textContent = title;
  $('finalStars').textContent = stars;
  $('finalMsg').textContent = msg;
}

function restart(){
  init();
}

window.addEventListener('load', init);
</script>
</body>
</html>
