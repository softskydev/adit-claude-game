<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Dig: Excavation Adventure</title>
    <style>
        /* =========================================
           CSS VARIABLES & GLOBAL STYLES
           ========================================= */
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --secondary: #FFC107;
            --bg-top: #87CEEB;
            --bg-bottom: #8D6E63;
            --dirt: #5D4037;
            --dirt-light: #795548;
            --bone: #F5F5DC;
            --rock: #9E9E9E;
            --text-main: #333;
            --text-light: #fff;
            --font-main: 'Segoe UI', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-top) 30%, var(--bg-bottom) 30%, var(--bg-bottom) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* =========================================
           UI HEADER
           ========================================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .stat-box {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-main);
            background: var(--secondary);
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #FF9800;
        }

        button.btn-restart {
            background-color: #F44336;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px #D32F2F;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button.btn-restart:active {
            transform: translateY(4px);
            box-shadow: 0 0 #D32F2F;
        }

        /* =========================================
           EXCAVATION SITE (GAME AREA)
           ========================================= */
        main {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dig-site {
            width: 100%;
            max-width: 800px;
            height: 60vh;
            background: radial-gradient(circle, var(--dirt-light) 0%, var(--dirt) 100%);
            border-radius: 20px;
            border: 8px solid #4E342E;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Bones Positioning (Assembling a T-Rex) */
        .fossil {
            position: absolute;
            fill: var(--bone);
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.4));
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fossil.revealed {
            opacity: 1;
            transform: scale(1);
        }

        #bone-0 { width: 18%; top: 15%; left: 65%; transform-origin: center; } /* Skull */
        #bone-1 { width: 12%; top: 35%; left: 66%; } /* Jaw */
        #bone-2 { width: 25%; top: 30%; left: 40%; } /* Spine */
        #bone-3 { width: 15%; top: 40%; left: 48%; transform: rotate(15deg); } /* Ribs */
        #bone-4 { width: 20%; top: 25%; left: 22%; transform: rotate(-20deg); } /* Tail 1 */
        #bone-5 { width: 15%; top: 35%; left: 8%; transform: rotate(-40deg); } /* Tail 2 */
        #bone-6 { width: 10%; top: 45%; left: 60%; transform: rotate(45deg); } /* Tiny Arm */
        #bone-7 { width: 18%; top: 55%; left: 45%; transform: rotate(20deg); } /* Leg */

        /* Animation Layers */
        .anim-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pickaxe Animation */
        .pickaxe {
            font-size: 5rem;
            position: absolute;
            opacity: 0;
            transform-origin: bottom left;
            z-index: 20;
        }

        @keyframes swing {
            0% { transform: rotate(0deg) translateY(-20px); opacity: 1; }
            50% { transform: rotate(-45deg) translateY(20px); opacity: 1; }
            100% { transform: rotate(0deg) translateY(-20px); opacity: 1; }
        }

        /* Rock (Wrong Answer) */
        .rock {
            width: 80px;
            height: 60px;
            background: var(--rock);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            position: absolute;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .rock.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Particles (Dust/Coins) */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        @keyframes expandDust {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* =========================================
           MODALS
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(3px);
            opacity: 1;
            transition: opacity 0.3s;
        }

        .modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 4px solid var(--primary);
            transform: scale(1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.hidden .modal-content {
            transform: scale(0.8);
        }

        .question-text {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--text-main);
            font-weight: bold;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: #E3F2FD;
            border: 2px solid #2196F3;
            color: #1565C0;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px #2196F3;
            transition: all 0.1s;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 #2196F3;
        }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        /* Victory Modal */
        #victory-modal .modal-content {
            border-color: var(--secondary);
            background: #FFFDE7;
        }

        .victory-title {
            font-size: 2.5rem;
            color: #FF9800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .victory-score {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .btn-play-again {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px var(--primary-dark);
        }

        .btn-play-again:active {
            transform: translateY(4px);
            box-shadow: 0 0 var(--primary-dark);
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 20px;
            z-index: 90;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="stat-box" id="score-display">Score: 0</div>
        <button class="btn-restart" onclick="initGame()">Restart Site</button>
        <div class="stat-box" id="progress-display">Fossils: 0 / 8</div>
    </header>

    <main>
        <div class="dig-site" id="dig-site">
            <div class="anim-layer" id="anim-layer">
                <div class="pickaxe" id="pickaxe">⛏️</div>
                <div class="rock" id="rock"></div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="quiz-modal">
        <div class="modal-content">
            <h2 class="question-text" id="question-text">Question goes here?</h2>
            <div class="options-grid" id="options-grid">
                </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="victory-modal">
        <div class="modal-content">
            <h1 class="victory-title">Dinosaur Completed!</h1>
            <p class="victory-score" id="final-score">Final Score: 800</p>
            <button class="btn-play-again" onclick="initGame()">Excavate Another!</button>
        </div>
    </div>

    <script>
        /* =========================================
           GAME DATA & CONFIGURATION
           ========================================= */
        const TOTAL_FOSSILS = 8;
        const SCORE_PER_BONE = 100;

        // Sample Questions Array (Easily customizable)
        const allQuestions = [
            { q: "What does the word 'Dinosaur' mean?", options: ["Terrible Lizard", "Giant Bird", "Ancient Bone", "Earth King"], answer: 0 },
            { q: "Which dinosaur had three horns?", options: ["T-Rex", "Triceratops", "Stegosaurus", "Velociraptor"], answer: 1 },
            { q: "What do we call scientists who study fossils?", options: ["Geologists", "Biologists", "Paleontologists", "Archaeologists"], answer: 2 },
            { q: "During which era did dinosaurs live?", options: ["Paleozoic", "Mesozoic", "Cenozoic", "Precambrian"], answer: 1 },
            { q: "Which of these is known as the 'King' of dinosaurs?", options: ["Spinosaurus", "Brachiosaurus", "Tyrannosaurus Rex", "Allosaurus"], answer: 2 },
            { q: "What did a Stegosaurus have on its back?", options: ["Spikes", "Feathers", "Plates", "Fur"], answer: 2 },
            { q: "Which dinosaur is famous for a large club on its tail?", options: ["Ankylosaurus", "Iguanodon", "Pteranodon", "Diplodocus"], answer: 0 },
            { q: "Are birds considered modern-day descendants of dinosaurs?", options: ["Yes", "No", "Only penguins", "Only ostriches"], answer: 0 },
            { q: "What is fossilized tree resin called?", options: ["Sap", "Amber", "Crystal", "Quartz"], answer: 1 },
            { q: "Which of these was a flying reptile, NOT a true dinosaur?", options: ["Velociraptor", "Gallimimus", "Pterodactyl", "Oviraptor"], answer: 2 }
        ];

        // SVGs for the 8 fossil pieces (Stylized Cartoon Bones)
        const fossilSVGs = [
            // 0: Skull
            `<svg viewBox="0 0 100 100"><path d="M80,20 C90,20 95,30 95,45 C95,65 85,85 65,85 C55,85 45,75 35,75 C25,75 10,70 10,50 C10,30 30,20 50,20 Z" /><circle cx="65" cy="45" r="8" fill="#5D4037"/></svg>`,
            // 1: Jaw
            `<svg viewBox="0 0 100 40"><path d="M10,20 C30,40 70,40 90,20 L80,10 C60,25 40,25 20,10 Z" /><path d="M20,10 L25,5 M40,15 L45,5 M60,15 L65,5 M80,10 L85,5" stroke="#F5F5DC" stroke-width="3"/></svg>`,
            // 2: Spine (Line of dots/bones)
            `<svg viewBox="0 0 100 30"><rect x="5" y="10" width="90" height="10" rx="5"/><circle cx="20" cy="15" r="12"/><circle cx="50" cy="15" r="12"/><circle cx="80" cy="15" r="12"/></svg>`,
            // 3: Ribs
            `<svg viewBox="0 0 100 100"><path d="M50,10 L50,90" stroke="var(--bone)" stroke-width="8" stroke-linecap="round"/><path d="M30,30 Q50,20 70,30 M20,50 Q50,40 80,50 M30,70 Q50,60 70,70" stroke="var(--bone)" stroke-width="8" stroke-linecap="round" fill="none"/></svg>`,
            // 4: Tail 1 (Thick Bone)
            `<svg viewBox="0 0 100 30"><rect x="15" y="5" width="70" height="20" rx="10"/><circle cx="15" cy="10" r="10"/><circle cx="15" cy="20" r="10"/><circle cx="85" cy="10" r="10"/><circle cx="85" cy="20" r="10"/></svg>`,
            // 5: Tail 2 (Thinner Bone)
            `<svg viewBox="0 0 100 24"><rect x="15" y="4" width="70" height="16" rx="8"/><circle cx="15" cy="8" r="8"/><circle cx="15" cy="16" r="8"/><circle cx="85" cy="8" r="8"/><circle cx="85" cy="16" r="8"/></svg>`,
            // 6: Arm
            `<svg viewBox="0 0 80 20"><rect x="10" y="5" width="60" height="10" rx="5"/><circle cx="10" cy="10" r="6"/><circle cx="70" cy="10" r="6"/></svg>`,
            // 7: Leg
            `<svg viewBox="0 0 100 40"><rect x="20" y="5" width="60" height="30" rx="15"/><circle cx="20" cy="12" r="15"/><circle cx="20" cy="28" r="15"/><circle cx="80" cy="12" r="15"/><circle cx="80" cy="28" r="15"/></svg>`
        ];

        /* =========================================
           STATE MANAGEMENT
           ========================================= */
        let currentQuestions = [];
        let score = 0;
        let fossilsFound = 0;
        let isAnimating = false;

        // DOM Elements
        const elScore = document.getElementById('score-display');
        const elProgress = document.getElementById('progress-display');
        const elDigSite = document.getElementById('dig-site');
        const elQuizModal = document.getElementById('quiz-modal');
        const elQuestionText = document.getElementById('question-text');
        const elOptionsGrid = document.getElementById('options-grid');
        const elVictoryModal = document.getElementById('victory-modal');
        const elFinalScore = document.getElementById('final-score');
        const elPickaxe = document.getElementById('pickaxe');
        const elRock = document.getElementById('rock');
        const elAnimLayer = document.getElementById('anim-layer');

        /* =========================================
           CORE LOGIC
           ========================================= */
        
        function initGame() {
            // Reset State
            score = 0;
            fossilsFound = 0;
            isAnimating = false;
            updateUI();

            // Shuffle questions and select the ones we need
            currentQuestions = [...allQuestions].sort(() => Math.random() - 0.5);

            // Clean up DOM
            elVictoryModal.classList.add('hidden');
            elQuizModal.classList.remove('hidden');
            elRock.classList.remove('show');
            document.querySelectorAll('.confetti').forEach(e => e.remove());

            // Inject Fossil SVGs into the dirt
            elDigSite.innerHTML = '';
            elDigSite.appendChild(elAnimLayer); // Keep animation layer
            
            for (let i = 0; i < TOTAL_FOSSILS; i++) {
                const boneDiv = document.createElement('div');
                boneDiv.className = 'fossil';
                boneDiv.id = `bone-${i}`;
                boneDiv.innerHTML = fossilSVGs[i];
                elDigSite.appendChild(boneDiv);
            }

            // // playSound('start.mp3'); // Placeholder for sound
            showNextQuestion();
        }

        function updateUI() {
            elScore.innerText = `Score: ${score}`;
            elProgress.innerText = `Fossils: ${fossilsFound} / ${TOTAL_FOSSILS}`;
        }

        function showNextQuestion() {
            if (fossilsFound >= TOTAL_FOSSILS) {
                triggerVictory();
                return;
            }

            // Ensure we have questions (loop if necessary, though array size > total fossils)
            const qData = currentQuestions[fossilsFound % currentQuestions.length];
            
            elQuestionText.innerText = qData.q;
            elOptionsGrid.innerHTML = '';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(index, qData.answer);
                elOptionsGrid.appendChild(btn);
            });

            elQuizModal.classList.remove('hidden');
        }

        function handleAnswer(selectedIndex, correctIndex) {
            if (isAnimating) return;
            isAnimating = true;
            
            elQuizModal.classList.add('hidden');

            const isCorrect = (selectedIndex === correctIndex);

            // Digging Animation Sequence
            elPickaxe.style.animation = 'swing 0.5s ease-in-out 2';
            // // playSound('dig.mp3'); // Placeholder

            setTimeout(() => {
                elPickaxe.style.animation = ''; // Reset pickaxe
                
                if (isCorrect) {
                    processCorrectAnswer();
                } else {
                    processWrongAnswer();
                }
            }, 1000); // Wait for pickaxe animation to finish
        }

        function processCorrectAnswer() {
            // // playSound('success.mp3'); // Placeholder
            score += SCORE_PER_BONE;
            
            // Reveal Bone
            const boneEl = document.getElementById(`bone-${fossilsFound}`);
            if (boneEl) boneEl.classList.add('revealed');
            
            fossilsFound++;
            updateUI();
            
            spawnParticles('coin', '#FFC107', 10);
            spawnParticles('sparkle', '#FFF', 5);

            setTimeout(() => {
                isAnimating = false;
                showNextQuestion();
            }, 1500);
        }

        function processWrongAnswer() {
            // // playSound('fail.mp3'); // Placeholder
            
            elRock.classList.add('show');
            spawnParticles('dust', '#795548', 15);

            setTimeout(() => {
                elRock.classList.remove('show');
                isAnimating = false;
                showNextQuestion();
            }, 2000);
        }

        /* =========================================
           PARTICLES & EFFECTS
           ========================================= */
        function spawnParticles(type, color, count) {
            const rect = elAnimLayer.getBoundingClientRect();
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = color;
                
                // Random position near center
                const x = 50 + (Math.random() * 20 - 10);
                const y = 50 + (Math.random() * 20 - 10);
                particle.style.left = `${x}%`;
                particle.style.top = `${y}%`;

                if (type === 'coin' || type === 'sparkle') {
                    particle.style.width = type === 'coin' ? '20px' : '10px';
                    particle.style.height = type === 'coin' ? '20px' : '10px';
                    particle.style.animation = `floatUp ${1 + Math.random()}s ease-out forwards`;
                } else if (type === 'dust') {
                    particle.style.width = '40px';
                    particle.style.height = '40px';
                    particle.style.opacity = '0.8';
                    particle.style.animation = `expandDust ${0.5 + Math.random() * 0.5}s ease-out forwards`;
                }

                elAnimLayer.appendChild(particle);

                // Cleanup
                setTimeout(() => {
                    if(particle.parentNode) particle.remove();
                }, 2000);
            }
        }

        function triggerVictory() {
            // // playSound('victory.mp3'); // Placeholder
            elFinalScore.innerText = `Final Score: ${score}`;
            elVictoryModal.classList.remove('hidden');
            
            // Confetti loop
            for (let i = 0; i < 100; i++) {
                createConfetti();
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            
            // Random properties
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.animationDelay = Math.random() * 2 + 's';

            document.body.appendChild(confetti);
        }

        // Initialize game on load
        window.onload = initGame;

    </script>
</body>
</html>
