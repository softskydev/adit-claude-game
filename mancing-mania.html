<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mancing Mania — Kuis Seru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f2a3d;
    --muted:#4d6a7a;
    --amber:#ffb703;
    --amber-dark:#c98600;
    --green:#2ecc71;
    --green-dark:#1f9d57;
    --red:#e63946;
    --red-dark:#b3222d;
    --navy:#0f2a3d;
    --navy-light:#1c4b66;
    --sea-top:#4fb3c9;
    --sea-deep:#08324a;
    --cream:#fdf6e8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Nunito',sans-serif;
    background:#04141d;
    color:var(--ink);
    height:100vh;width:100vw;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  h1,h2,h3,.btn{font-family:'Baloo 2',cursive}

  /* ===== STAGE ===== */
  .stage-root{
    position:relative;
    width:min(100vw, calc(100vh * 16 / 9));
    aspect-ratio:16/9;
  }
  .scene{
    position:absolute;inset:0;
    overflow:hidden;
    border-radius:0;
    background:var(--navy);
  }

  /* ===== SEA ===== */
  .sea{
    position:absolute;left:0;right:0;top:0;bottom:33%;
    background:linear-gradient(180deg, var(--sea-top) 0%, #1d7c93 30%, #0f4f66 62%, var(--sea-deep) 100%);
    overflow:hidden;
  }
  .sea::before{
    content:'';position:absolute;inset:0;
    background:
      repeating-linear-gradient(180deg, rgba(255,255,255,.07) 0 2px, transparent 2px 38px);
    opacity:.6;
    pointer-events:none;
  }
  .wave-top{
    position:absolute;left:0;right:0;top:0;height:5%;
    background:repeating-linear-gradient(90deg, rgba(255,255,255,.35) 0 4%, transparent 4% 8%);
    opacity:.5;
    animation:waveShift 3.5s linear infinite;
  }
  @keyframes waveShift{from{background-position-x:0}to{background-position-x:-200px}}

  .fish-decor{
    position:absolute;
    display:flex;align-items:center;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }
  .fish-decor .body{
    width:3.2vw;max-width:46px;min-width:20px;aspect-ratio:2/1;
    border-radius:50%;
    position:relative;
  }
  .fish-decor .body::after{
    content:'';position:absolute;left:14%;top:30%;width:16%;aspect-ratio:1/1;
    background:#0f2a3d;border-radius:50%;
  }
  .fish-decor .tail{
    width:0;height:0;
    border-top:.9vw solid transparent;
    border-bottom:.9vw solid transparent;
    border-right:1.3vw solid;
    margin-right:-2px;
    filter:brightness(.9);
  }
  .fish-decor.f1{left:14%;top:58%;animation-name:swimRight;animation-duration:9s}
  .fish-decor.f1 .body{background:#ff9f45}
  .fish-decor.f1 .tail{border-right-color:#ff9f45}
  .fish-decor.f2{left:70%;top:48%;animation-name:swimLeft;animation-duration:11s;transform:scaleX(-1)}
  .fish-decor.f2 .body{background:#ffd23f}
  .fish-decor.f2 .tail{border-right-color:#ffd23f}
  .fish-decor.f3{left:30%;top:80%;animation-name:swimRight;animation-duration:13s;animation-delay:-4s}
  .fish-decor.f3 .body{background:#5ad1e6}
  .fish-decor.f3 .tail{border-right-color:#5ad1e6}
  @keyframes swimRight{
    0%{transform:translateX(0)}
    50%{transform:translateX(8vw)}
    50.01%{transform:translateX(8vw) scaleX(-1)}
    99.99%{transform:translateX(0) scaleX(-1)}
    100%{transform:translateX(0)}
  }
  @keyframes swimLeft{
    0%{transform:translateX(0) scaleX(-1)}
    50%{transform:translateX(-8vw) scaleX(-1)}
    50.01%{transform:translateX(-8vw)}
    99.99%{transform:translateX(0)}
    100%{transform:translateX(0) scaleX(-1)}
  }

  /* ===== BOAT ===== */
  .boat{
    position:absolute;left:56%;top:1%;width:15%;
    transform:translate(-50%,0);
    animation:bob 2.6s ease-in-out infinite;
    z-index:4;
  }
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-3%)}}
  .boat .hull{
    width:100%;aspect-ratio:5/1.6;
    background:linear-gradient(180deg,#a5672f,#7a4a1f);
    clip-path:polygon(6% 0%, 94% 0%, 82% 100%, 18% 100%);
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.25);
  }
  .boat .cabin{
    position:absolute;left:20%;bottom:88%;width:38%;aspect-ratio:1.5/1;
    background:var(--cream);
    border:2px solid #d8c9a3;
    border-radius:4px 4px 0 0;
  }
  .boat .cabin::after{
    content:'';position:absolute;left:30%;top:25%;width:34%;aspect-ratio:1/1;
    background:#7cc9dd;border-radius:50%;border:1px solid #4a94a8;
  }
  .boat .mast{
    position:absolute;left:24%;bottom:88%;width:2px;height:70%;
    background:#5a3a1a;
    transform-origin:bottom center;
    animation:sway 2.6s ease-in-out infinite;
  }
  @keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  .boat .flag{
    position:absolute;top:0;left:100%;width:0;height:0;
    border-top:.9vw solid transparent;
    border-bottom:.9vw solid transparent;
    border-left:1.4vw solid var(--red);
  }

  /* ===== FISHING LINE / HOOK ===== */
  .rod-line{
    position:absolute;left:64%;top:16%;width:2px;height:38%;
    background:linear-gradient(180deg,#e9e2cf,#cbbf9e);
    transform-origin:top center;
    transform:scaleY(.14);
    transition:transform 1.1s cubic-bezier(.4,0,.2,1);
    z-index:3;
  }
  .hook{
    position:absolute;left:64%;top:calc(16% + 5.32%);width:1.4%;aspect-ratio:1/1;
    background:radial-gradient(circle at 35% 30%, #fff6d8, var(--amber) 65%, var(--amber-dark));
    border-radius:50%;
    transform:translate(-50%,-50%);
    transition:top 1.1s cubic-bezier(.4,0,.2,1);
    z-index:3;
    box-shadow:0 2px 4px rgba(0,0,0,.3);
  }
  .catch-item{
    position:absolute;left:50%;top:100%;
    transform:translate(-50%,10%) scale(0);
    opacity:0;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
    pointer-events:none;
  }
  .catch-item.show{transform:translate(-50%,10%) scale(1);opacity:1}

  .catch-fish{width:5.5vw;max-width:78px;min-width:34px;aspect-ratio:2/1.1;position:relative}
  .catch-fish .fbody{width:78%;height:100%;background:linear-gradient(180deg,#ff9f45,#f4732a);border-radius:50%;position:relative}
  .catch-fish .fbody::after{content:'';position:absolute;left:12%;top:28%;width:14%;aspect-ratio:1/1;background:#0f2a3d;border-radius:50%}
  .catch-fish .ftail{position:absolute;right:-4%;top:18%;width:0;height:0;border-top:1.3vw solid transparent;border-bottom:1.3vw solid transparent;border-right:2vw solid #f4732a}

  .catch-shoe{width:5vw;max-width:70px;min-width:32px;aspect-ratio:1.7/1;position:relative}
  .catch-shoe .sole{position:absolute;left:0;bottom:0;width:100%;height:22%;background:#3a3f44;border-radius:0 0 30% 10%}
  .catch-shoe .upper{position:absolute;left:6%;top:0;width:80%;height:82%;background:#8a6a4a;border-radius:0 65% 20% 40%/0 65% 65% 40%;border:2px solid #5c4630}
  .catch-shoe .lace{position:absolute;left:22%;top:22%;width:40%;height:2px;background:#e9e2cf;box-shadow:0 8px 0 #e9e2cf, 0 16px 0 #e9e2cf}

  .splash{
    position:absolute;left:64%;top:16%;
    width:3.2%;aspect-ratio:1/1;
    transform:translate(-50%,-50%) scale(0);
    border:3px solid rgba(255,255,255,.85);
    border-radius:50%;
    pointer-events:none;
    z-index:3;
  }
  .splash.play{animation:splashPop .6s ease-out forwards}
  @keyframes splashPop{
    0%{opacity:.9;transform:translate(-50%,-50%) scale(.2)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(2.4)}
  }

  /* ===== QUIZ PANEL (bottom of screen) ===== */
  .quiz-panel{
    position:absolute;left:0;bottom:0;width:100%;height:33%;
    background:linear-gradient(180deg, var(--navy) 0%, var(--navy-light) 100%);
    border-top:4px solid #08202e;
    box-shadow:0 -8px 18px rgba(0,0,0,.35);
    z-index:5;
  }
  .question-bar{
    position:absolute;left:6%;top:6%;width:88%;height:26%;
    background:linear-gradient(180deg,#16597a,#0e405a);
    border:3px solid #2c7c9e;
    border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    padding:1.5% 3%;
    box-shadow:inset 0 2px 6px rgba(255,255,255,.12), 0 6px 10px rgba(0,0,0,.25);
    container-type:inline-size;
  }
  .question-bar .txt{
    color:#fff;font-weight:800;text-align:center;
    font-size:clamp(12px,4.3cqw,26px);
    line-height:1.28;
  }

  .answers-grid{
    position:absolute;left:8%;top:36%;width:84%;height:60%;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
    gap:3%;
  }
  .ans-btn{
    position:relative;
    background:linear-gradient(180deg,#fdf6e8,#f3e6c8);
    border:3px solid #d8c48a;
    border-radius:14px;
    cursor:pointer;
    display:flex;align-items:center;
    padding:2% 4% 2% 11%;
    text-align:left;
    color:var(--ink);
    font-family:'Nunito',sans-serif;
    font-weight:700;
    transition:transform .12s, filter .15s, background .15s;
    container-type:inline-size;
  }
  .ans-btn .txt{font-size:clamp(10px,3.6cqw,17px);line-height:1.2}
  .ans-btn .letter{
    position:absolute;left:3%;top:50%;transform:translateY(-50%);
    height:74%;width:auto;aspect-ratio:1/1;
    background:var(--amber);
    border:2px solid var(--amber-dark);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',cursive;font-weight:800;color:var(--ink);
    font-size:clamp(10px,4cqw,18px);
  }
  .ans-btn:hover:not(.disabled){transform:translateY(-2px);filter:brightness(1.04)}
  .ans-btn:active:not(.disabled){transform:translateY(1px)}
  .ans-btn.disabled{cursor:default}
  .ans-btn.correct{background:linear-gradient(180deg,#d9f5e3,#bdeccf);border-color:var(--green)}
  .ans-btn.wrong{background:linear-gradient(180deg,#ffe0da,#ffc7bd);border-color:var(--red)}

  /* ===== POPUP ===== */
  .popup-overlay{
    position:absolute;inset:0;background:rgba(4,20,29,.6);
    display:none;align-items:center;justify-content:center;padding:4%;z-index:20;
  }
  .popup-overlay.show{display:flex;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  .popup-card{
    background:#fff;color:var(--ink);border-radius:16px;padding:6% 6%;text-align:center;
    max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .popup-card .icon{font-size:clamp(30px,8vw,52px)}
  .popup-card h3{font-size:clamp(16px,4.5vw,22px)}
  .popup-card h3.good{color:var(--green-dark)}
  .popup-card h3.bad{color:var(--red-dark)}
  .popup-card p{font-size:clamp(10px,2.6vw,13.5px);color:#555;font-weight:600;line-height:1.4}

  .btn{
    border:none;cursor:pointer;
    background:var(--amber);
    color:var(--ink);
    font-size:clamp(12px,3vw,16px);font-weight:800;
    padding:11px 26px;
    border-radius:14px;
    border-bottom:5px solid var(--amber-dark);
    transition:transform .1s, border-bottom-width .1s;
    width:100%;
  }
  .btn:hover{transform:translateY(1px)}
  .btn:active{transform:translateY(4px);border-bottom-width:1px}
  .btn:focus-visible{outline:3px dashed var(--navy-light);outline-offset:3px}
  .btn-green{background:var(--green);color:#fff;border-bottom-color:var(--green-dark)}

  /* ===== HUD ===== */
  .hud{
    position:absolute;z-index:10;
    background:rgba(4,20,29,.55);
    color:#fff;
    border-radius:999px;
    backdrop-filter:blur(3px);
  }
  .hud-title{
    top:2.5%;left:2%;
    padding:1.1% 2.2%;
    font-weight:800;
    font-size:clamp(11px,1.7vw,17px);
    display:flex;align-items:center;gap:.5em;
    white-space:nowrap;
  }
  .hud-stats{top:2.5%;right:2%;display:flex;gap:.6%;background:none}
  .hud-chip{
    background:rgba(4,20,29,.55);
    padding:1.1% 2%;
    text-align:center;
    min-width:3.6em;
  }
  .hud-chip small{display:block;font-size:.55em;letter-spacing:.1em;text-transform:uppercase;font-weight:700;opacity:.8}
  .hud-chip b{font-size:clamp(11px,1.6vw,16px)}

  /* ===== FINAL ===== */
  .final-overlay{
    position:absolute;inset:0;z-index:30;
    display:none;align-items:center;justify-content:center;
    background:rgba(4,20,29,.72);
    padding:4%;
  }
  .final-overlay.show{display:flex;animation:pop .3s ease}
  .final-card{
    background:#fff;color:var(--ink);border-radius:16px;
    padding:4% 5%;text-align:center;max-width:440px;width:100%;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .final-card .big{font-size:clamp(40px,8vw,64px)}
  .final-card h2{font-size:clamp(18px,4vw,26px);color:var(--navy)}
  .stars{font-size:clamp(18px,3.6vw,28px);letter-spacing:5px}
  .final-stats{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .stat{background:#fff;border:3px solid var(--navy);border-radius:14px;padding:6px 16px;font-weight:800}
  .stat small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .stat b{font-size:clamp(15px,3vw,20px)}
  .final-card p.msg{font-weight:700;color:var(--muted);max-width:46ch;font-size:clamp(11px,2.4vw,14px)}
  .final-card .btn{max-width:220px}

  /* ===== LANDSCAPE / DESKTOP ONLY ===== */
  .rotate-hint{
    display:none;
    position:fixed;inset:0;z-index:999;
    background:#04141d;color:#fff;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;
    text-align:center;padding:8vw;
  }
  .rotate-hint .ico{font-size:15vw;animation:spin 1.8s ease-in-out infinite}
  @keyframes spin{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}
  .rotate-hint p{font-weight:700;font-size:clamp(14px,4vw,18px);max-width:32ch}

  @media (orientation:portrait){
    .rotate-hint{display:flex}
    .stage-root{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }

  /* ===== FULLSCREEN TOGGLE ===== */
  .fs-btn{
    position:fixed;z-index:1000;
    bottom:16px;right:16px;
    width:44px;height:44px;
    border:none;border-radius:50%;
    background:rgba(4,20,29,.55);
    color:#fff;
    font-size:20px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    backdrop-filter:blur(3px);
    transition:transform .2s ease, background .2s ease;
  }
  .fs-btn:hover{background:rgba(4,20,29,.8)}
  .fs-btn.is-fullscreen{transform:rotate(45deg)}
</style>
</head>
<body>

<button class="fs-btn" id="fsBtn" type="button" title="Fullscreen" aria-label="Fullscreen">⛶</button>

<div class="rotate-hint">
  <div class="ico">🔄</div>
  <p>Putar perangkat ke mode landscape atau buka di layar desktop untuk bermain.</p>
</div>

<div class="stage-root">
  <div class="scene" id="scene">

    <div class="hud hud-title">🎣 Mancing Mania</div>
    <div class="hud hud-stats">
      <div class="hud-chip"><small>Soal</small><b id="progressText">1/10</b></div>
      <div class="hud-chip"><small>Skor</small><b id="gameScore">0</b></div>
    </div>

    <div class="sea">
      <div class="wave-top"></div>

      <div class="fish-decor f1"><div class="body"></div><div class="tail"></div></div>
      <div class="fish-decor f2"><div class="body"></div><div class="tail"></div></div>
      <div class="fish-decor f3"><div class="body"></div><div class="tail"></div></div>

      <div class="boat">
        <div class="mast"><div class="flag"></div></div>
        <div class="cabin"></div>
        <div class="hull"></div>
      </div>

      <div class="rod-line" id="rodLine"></div>
      <div class="hook" id="hook">
        <div class="catch-item" id="catchItem"></div>
      </div>
      <div class="splash" id="splash"></div>
    </div>

    <div class="quiz-panel">
      <div class="question-bar">
        <div class="txt" id="questionText">Pertanyaan…</div>
      </div>
      <div class="answers-grid">
        <button class="ans-btn" type="button" data-pos="0" id="ans0"><span class="letter">A</span><span class="txt"></span></button>
        <button class="ans-btn" type="button" data-pos="1" id="ans1"><span class="letter">B</span><span class="txt"></span></button>
        <button class="ans-btn" type="button" data-pos="2" id="ans2"><span class="letter">C</span><span class="txt"></span></button>
        <button class="ans-btn" type="button" data-pos="3" id="ans3"><span class="letter">D</span><span class="txt"></span></button>
      </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
      <div class="popup-card">
        <div class="icon" id="popupIcon">🐟</div>
        <h3 id="popupTitle">Jawaban Benar!</h3>
        <p id="popupExplain"></p>
        <button class="btn btn-green" id="popupBtn" onclick="nextQuestion()">Lanjut ➜</button>
      </div>
    </div>
  </div>

  <div class="final-overlay" id="screenFinal">
    <div class="final-card">
      <div class="big" id="finalEmoji">🏆</div>
      <h2 id="finalTitle">Juara Mancing!</h2>
      <div class="stars" id="finalStars">⭐⭐⭐</div>
      <div class="final-stats">
        <div class="stat"><small>Dapat Ikan</small><b id="statHit">0</b></div>
        <div class="stat"><small>Dapat Sampah</small><b id="statMiss">0</b></div>
        <div class="stat"><small>Skor Akhir</small><b id="statScore">0</b></div>
      </div>
      <p class="msg" id="finalMsg"></p>
      <button class="btn btn-green" onclick="restart()">🔄 Main Lagi</button>
    </div>
  </div>
</div>

<script>
/* ================== DATA ================== */
const QUESTIONS = [
  { q: "Ibu kota Indonesia adalah?", a: ["Bandung","Surabaya","Jakarta","Medan"], correct: 2, explain: "Ibu kota Indonesia adalah Jakarta." },
  { q: "Planet yang paling dekat dengan Matahari adalah?", a: ["Venus","Merkurius","Bumi","Mars"], correct: 1, explain: "Merkurius adalah planet terdekat dengan Matahari." },
  { q: "Hewan yang dijuluki sebagai raja hutan adalah?", a: ["Harimau","Gajah","Singa","Serigala"], correct: 2, explain: "Singa dikenal sebagai raja hutan." },
  { q: "Berapa jumlah hari dalam satu tahun kabisat?", a: ["364","365","366","367"], correct: 2, explain: "Tahun kabisat memiliki 366 hari." },
  { q: "Warna campuran biru dan kuning menghasilkan warna?", a: ["Ungu","Hijau","Oranye","Merah muda"], correct: 1, explain: "Biru + kuning = hijau." },
  { q: "Benua terbesar di dunia adalah?", a: ["Afrika","Eropa","Asia","Amerika"], correct: 2, explain: "Asia adalah benua terbesar di dunia." },
  { q: "Alat yang digunakan untuk mengukur suhu disebut?", a: ["Barometer","Termometer","Speedometer","Altimeter"], correct: 1, explain: "Termometer digunakan untuk mengukur suhu." },
  { q: "Proses tumbuhan membuat makanannya sendiri disebut?", a: ["Respirasi","Fotosintesis","Fermentasi","Transpirasi"], correct: 1, explain: "Tumbuhan membuat makanan lewat fotosintesis." },
  { q: "Bangun datar segitiga memiliki berapa sisi?", a: ["2","3","4","5"], correct: 1, explain: "Segitiga memiliki 3 sisi." },
  { q: "Air akan membeku pada suhu berapa derajat Celsius?", a: ["0°C","10°C","-5°C","5°C"], correct: 0, explain: "Air membeku pada suhu 0°C." }
];

/* ================== STATE ================== */
let order = 0, score = 0, hit = 0, miss = 0;
let shuffledQ = [];

/* ================== HELPERS ================== */
const $ = id => document.getElementById(id);
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ================== FLOW ================== */
function init(){
  shuffledQ = shuffle(QUESTIONS);
  order = 0; score = 0; hit = 0; miss = 0;
  $('gameScore').textContent = 0;
  $('screenFinal').classList.remove('show');
  showQuestion();
}

function resetRod(){
  const line = $('rodLine');
  const hook = $('hook');
  const item = $('catchItem');
  line.style.transition = 'none';
  hook.style.transition = 'none';
  line.style.transform = 'scaleY(.14)';
  hook.style.top = 'calc(16% + 5.32%)';
  void line.offsetWidth;
  line.style.transition = '';
  hook.style.transition = '';
  item.classList.remove('show');
  item.innerHTML = '';
  $('splash').classList.remove('play');
}

function showQuestion(){
  const q = shuffledQ[order];
  $('progressText').textContent = `${order + 1}/${shuffledQ.length}`;

  resetRod();

  $('questionText').textContent = q.q;

  const idxOrder = shuffle([0,1,2,3]);
  idxOrder.forEach((ai, pos) => {
    const el = $('ans' + pos);
    el.querySelector('.txt').textContent = q.a[ai];
    el.classList.remove('correct','wrong','disabled');
    el.onclick = () => handleAnswer(pos, ai === q.correct, q);
  });
}

function playSplash(){
  const splash = $('splash');
  splash.classList.remove('play');
  void splash.offsetWidth;
  splash.classList.add('play');
}

function handleAnswer(pos, isCorrect, q){
  const q_correctText = q.a[q.correct];
  document.querySelectorAll('.ans-btn').forEach(el => {
    el.classList.add('disabled');
    el.onclick = null;
    if(el.querySelector('.txt').textContent.trim() === q_correctText.trim()) el.classList.add('correct');
  });
  if(!isCorrect) $('ans' + pos).classList.add('wrong');

  const line = $('rodLine');
  const hook = $('hook');
  const item = $('catchItem');

  /* cast down */
  playSplash();
  line.style.transform = 'scaleY(1)';
  hook.style.top = 'calc(16% + 38%)';

  setTimeout(() => {
    /* attach catch item */
    item.innerHTML = isCorrect
      ? '<div class="catch-fish"><div class="ftail"></div><div class="fbody"></div></div>'
      : '<div class="catch-shoe"><div class="upper"></div><div class="lace"></div><div class="sole"></div></div>';
    item.classList.add('show');
  }, 1150);

  setTimeout(() => {
    /* reel back up */
    line.style.transform = 'scaleY(.14)';
    hook.style.top = 'calc(16% + 5.32%)';
  }, 1650);

  setTimeout(() => playSplash(), 2700);
  setTimeout(() => showPopup(isCorrect, q), 3000);
}

function showPopup(isCorrect, q){
  if(isCorrect){ score += 100; hit++; } else { miss++; }
  $('gameScore').textContent = score;

  $('popupIcon').textContent = isCorrect ? '🐟' : '🥾';
  const t = $('popupTitle');
  t.textContent = isCorrect ? 'Jawaban Benar!' : 'Jawaban Salah!';
  t.className = isCorrect ? 'good' : 'bad';
  $('popupExplain').textContent = isCorrect
    ? '🎉 ' + q.explain
    : '❌ Jawaban benar: ' + q.a[q.correct] + ' (' + q.explain + ')';
  $('popupBtn').textContent = (order + 1 >= shuffledQ.length) ? 'Lihat Hasil Akhir 🏁' : 'Lanjut ➜';

  $('popupOverlay').classList.add('show');
}

function nextQuestion(){
  $('popupOverlay').classList.remove('show');
  order++;
  if(order >= shuffledQ.length){ finish(); } else { showQuestion(); }
}

function finish(){
  $('screenFinal').classList.add('show');

  $('statHit').textContent = hit;
  $('statMiss').textContent = miss;
  $('statScore').textContent = score;

  const ratio = hit / shuffledQ.length;
  let emoji, title, stars, msg;
  if(ratio === 1){
    emoji = '🏆'; title = 'Juara Mancing Sempurna!'; stars = '⭐⭐⭐⭐⭐';
    msg = 'Sempurna! Semua lemparan dapat ikan. Kamu jago menjawab sekaligus jago memancing!';
  } else if(ratio >= .75){
    emoji = '🎣'; title = 'Pemancing Andal!'; stars = '⭐⭐⭐⭐';
    msg = 'Kerja bagus! Hampir semua lemparan dapat ikan. Sedikit lagi jadi juara sempurna!';
  } else if(ratio >= .5){
    emoji = '🙂'; title = 'Pemancing Pemula'; stars = '⭐⭐⭐';
    msg = 'Lumayan! Tapi masih ada beberapa lemparan yang dapat sampah. Yuk asah lagi wawasanmu!';
  } else {
    emoji = '🥾'; title = 'Banyak Dapat Sampah…'; stars = '⭐';
    msg = 'Waduh, banyak yang dapat sampah! Jangan menyerah, coba lagi ya!';
  }
  $('finalEmoji').textContent = emoji;
  $('finalTitle').textContent = title;
  $('finalStars').textContent = stars;
  $('finalMsg').textContent = msg;
}

function restart(){
  init();
}

/* ================== FULLSCREEN TOGGLE ================== */
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement ||
            document.mozFullScreenElement || document.msFullscreenElement);
}
function toggleFullscreen(){
  if(!isFullscreen()){
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen ||
                el.mozRequestFullScreen || el.msRequestFullscreen;
    if(req) req.call(el);
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen ||
                 document.mozCancelFullScreen || document.msExitFullscreen;
    if(exit) exit.call(document);
  }
}
function updateFsBtn(){
  const btn = $('fsBtn');
  const fs = isFullscreen();
  btn.classList.toggle('is-fullscreen', fs);
  btn.title = fs ? 'Keluar Fullscreen' : 'Fullscreen';
  btn.setAttribute('aria-label', btn.title);
}
(function initFullscreenBtn(){
  const btn = $('fsBtn');
  const el = document.documentElement;
  const supported = !!(el.requestFullscreen || el.webkitRequestFullscreen ||
                        el.mozRequestFullScreen || el.msRequestFullscreen);
  if(!supported){ btn.style.display = 'none'; return; }
  btn.addEventListener('click', toggleFullscreen);
  ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange']
    .forEach(evt => document.addEventListener(evt, updateFsBtn));
})();

window.addEventListener('load', init);
</script>
</body>
