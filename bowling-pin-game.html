<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bowling Pintar — Kuis Matematika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16211e;
    --muted:#5b6b66;
    --amber:#ffb703;
    --amber-dark:#c98600;
    --green:#2ecc71;
    --green-dark:#1f9d57;
    --red:#e63946;
    --red-dark:#b3222d;
    --teal-dark:#134940;
    --yellow:#ffe066;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Nunito',sans-serif;
    background:#0c1917;
    color:var(--ink);
    height:100vh;width:100vw;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  h1,h2,h3,.btn{font-family:'Baloo 2',cursive}

  /* ===== STAGE (fills viewport, letterboxed to the background's own ratio) ===== */
  .stage-root{
    position:relative;
    width:min(100vw, calc(100vh * 8084 / 4552));
    aspect-ratio:8084/4552;
  }
  .canvas{
    position:absolute;inset:0;
    background:url('bowling-game/background.png') no-repeat center / 100% 100%;
    overflow:hidden;
  }

  /* ===== HUD ===== */
  .hud{
    position:absolute;z-index:10;
    background:rgba(12,25,23,.55);
    color:#fff;
    border-radius:999px;
    backdrop-filter:blur(3px);
  }
  .hud-title{
    top:2.5%;left:2%;
    padding:1.1% 2.2%;
    font-weight:800;
    font-size:clamp(11px,1.7vw,17px);
    display:flex;align-items:center;gap:.5em;
    white-space:nowrap;
  }
  .hud-stats{top:2.5%;right:2%;display:flex;gap:.6%;background:none}
  .hud-chip{
    background:rgba(12,25,23,.55);
    padding:1.1% 2%;
    text-align:center;
    min-width:3.6em;
  }
  .hud-chip small{display:block;font-size:.55em;letter-spacing:.1em;text-transform:uppercase;font-weight:700;opacity:.8}
  .hud-chip b{font-size:clamp(11px,1.6vw,16px)}

  /* ===== PERSON / BALL / PINS ===== */
  #person{
    position:absolute;
    left:50%;top:9%;width:7.5%;
    aspect-ratio:223/479;
    transform:translateX(-50%) scale(1);
    transform-origin:50% 100%;
    pointer-events:none;
    z-index:1;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.35));
    transition:transform .18s ease;
  }
  #person.throwing{transform:translateX(-50%) scale(1.08)}
  #ball{
    position:absolute;
    left:50%;top:45%;width:2.6%;
    aspect-ratio:1/1;
    border-radius:50%;
    transform:translate(-50%,-50%) scale(1);
    transition:left 1s cubic-bezier(.4,0,.2,1), top 1s cubic-bezier(.4,0,.2,1), transform 1s cubic-bezier(.4,0,.2,1);
    pointer-events:none;
    z-index:4;
    filter:drop-shadow(0 4px 5px rgba(0,0,0,.4));
  }
  .pin{
    position:absolute;
    width:.9%;
    aspect-ratio:23/69;
    transform:translate(-50%,-100%) rotate(0deg);
    transition:transform .7s cubic-bezier(.3,.6,.4,1), opacity .7s ease;
    transform-origin:50% 85%;
    opacity:1;
    pointer-events:none;
    z-index:3;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.35));
  }

  /* ===== QUESTION / ANSWER BOARDS ===== */
  .qBox, .ansBox{
    position:absolute;
    container-type:inline-size;
  }
  .qBox img, .ansBox img{
    position:absolute;inset:0;
    width:100%;height:100%;
    display:block;
    pointer-events:none;
  }
  .qBox .txt, .ansBox .txt{
    position:absolute;
    display:flex;align-items:center;justify-content:center;
    text-align:center;
    font-weight:800;
    overflow:hidden;
  }

  .qBox{
    left:12.5%;top:53%;width:75%;
    aspect-ratio:5634/1499;
    z-index:2;
  }
  .qBox .txt{
    inset:14% 8%;
    color:var(--ink);
    font-size:clamp(9px,3.4cqw,19px);
    line-height:1.3;
  }

  .ansBox{
    top:86%;
    aspect-ratio:1553/512;
    width:16%;
    cursor:pointer;
    transition:filter .15s;
    z-index:5;
  }
  .ansBox .txt{
    inset:20% 8% 10% 22%;
    color:var(--yellow);
    font-size:clamp(8px,3.6cqw,15px);
    line-height:1.15;
    text-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .ansBox .letter{
    position:absolute;
    top:-8%;left:3%;width:17%;
    aspect-ratio:1/1;
    background:#4c5c59;
    border:2px solid #fff;
    border-radius:4px;
    color:#fff;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(8px,4cqw,15px);
    z-index:1;
  }
  .ansBox:hover:not(.disabled){filter:brightness(1.15)}
  .ansBox[data-pos="0"]{left:12.5%}
  .ansBox[data-pos="1"]{left:32.17%}
  .ansBox[data-pos="2"]{left:51.84%}
  .ansBox[data-pos="3"]{left:71.51%}

  .ansBox.disabled{cursor:default}
  .ansBox.correct{filter:brightness(1.2)}
  .ansBox.wrong{filter:brightness(.75)}

  /* ===== POPUP ===== */
  .popup-overlay{
    position:absolute;inset:0;background:rgba(15,20,28,.55);
    display:none;align-items:center;justify-content:center;padding:4%;z-index:20;
  }
  .popup-overlay.show{display:flex;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  .popup-card{
    background:#fff;color:var(--ink);border-radius:16px;padding:6% 6%;text-align:center;
    max-width:340px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .popup-card .icon{font-size:clamp(30px,8vw,52px)}
  .popup-card h3{font-size:clamp(16px,4.5vw,22px)}
  .popup-card h3.good{color:var(--green-dark)}
  .popup-card h3.bad{color:var(--red-dark)}
  .popup-card p{font-size:clamp(10px,2.6vw,13.5px);color:#555;font-weight:600;line-height:1.4}

  .btn{
    border:none;cursor:pointer;
    background:var(--amber);
    color:var(--ink);
    font-size:clamp(12px,3vw,16px);font-weight:800;
    padding:11px 26px;
    border-radius:14px;
    border-bottom:5px solid var(--amber-dark);
    transition:transform .1s, border-bottom-width .1s;
    width:100%;
  }
  .btn:hover{transform:translateY(1px)}
  .btn:active{transform:translateY(4px);border-bottom-width:1px}
  .btn:focus-visible{outline:3px dashed var(--teal-dark);outline-offset:3px}
  .btn-green{background:var(--green);color:#fff;border-bottom-color:var(--green-dark)}

  /* ===== FINAL ===== */
  .final-overlay{
    position:absolute;inset:0;z-index:30;
    display:none;align-items:center;justify-content:center;
    background:rgba(8,15,13,.72);
    padding:4%;
  }
  .final-overlay.show{display:flex;animation:pop .3s ease}
  .final-card{
    background:#fff;color:var(--ink);border-radius:16px;
    padding:4% 5%;text-align:center;max-width:440px;width:100%;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .final-card .big{font-size:clamp(40px,8vw,64px)}
  .final-card h2{font-size:clamp(18px,4vw,26px);color:var(--teal-dark)}
  .stars{font-size:clamp(18px,3.6vw,28px);letter-spacing:5px}
  .final-stats{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .stat{background:#fff;border:3px solid var(--teal-dark);border-radius:14px;padding:6px 16px;font-weight:800}
  .stat small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .stat b{font-size:clamp(15px,3vw,20px)}
  .final-card p.msg{font-weight:700;color:var(--muted);max-width:46ch;font-size:clamp(11px,2.4vw,14px)}
  .final-card .btn{max-width:220px}

  /* ===== LANDSCAPE / DESKTOP ONLY ===== */
  .rotate-hint{
    display:none;
    position:fixed;inset:0;z-index:999;
    background:#0c1917;color:#fff;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;
    text-align:center;padding:8vw;
  }
  .rotate-hint .ico{font-size:15vw;animation:spin 1.8s ease-in-out infinite}
  @keyframes spin{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}
  .rotate-hint p{font-weight:700;font-size:clamp(14px,4vw,18px);max-width:32ch}

  @media (orientation:portrait){
    .rotate-hint{display:flex}
    .stage-root{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }

  /* ===== FULLSCREEN TOGGLE ===== */
  .fs-btn{
    position:fixed;z-index:1000;
    bottom:16px;right:16px;
    width:44px;height:44px;
    border:none;border-radius:50%;
    background:rgba(12,25,23,.55);
    color:#fff;
    font-size:20px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    backdrop-filter:blur(3px);
    transition:transform .2s ease, background .2s ease;
  }
  .fs-btn:hover{background:rgba(12,25,23,.8)}
  .fs-btn.is-fullscreen{transform:rotate(45deg)}
</style>
</head>
<body>

<button class="fs-btn" id="fsBtn" type="button" title="Fullscreen" aria-label="Fullscreen">⛶</button>

<div class="rotate-hint">
  <div class="ico">🔄</div>
  <p>Putar perangkat ke mode landscape atau buka di layar desktop untuk bermain.</p>
</div>

<div class="stage-root">
  <div class="canvas" id="canvas">

    <div class="hud hud-title">🎳 Bowling Pintar</div>
    <div class="hud hud-stats">
      <div class="hud-chip"><small>Soal</small><b id="progressText">1/10</b></div>
      <div class="hud-chip"><small>Skor</small><b id="gameScore">0</b></div>
    </div>

    <img id="person" src="bowling-game/half.png" alt="Pemain bowling">
    <img id="ball" src="bowling-game/ball.png" alt="Bola bowling">
    <div id="pins"></div>

    <div class="qBox">
      <img src="bowling-game/question_board.png" alt="">
      <div class="txt" id="questionText">Pertanyaan…</div>
    </div>

    <div class="ansBox" data-pos="0" id="ans0">
      <img src="bowling-game/answer_score_board.png" alt="">
      <div class="letter">A</div>
      <div class="txt"></div>
    </div>
    <div class="ansBox" data-pos="1" id="ans1">
      <img src="bowling-game/answer_score_board.png" alt="">
      <div class="letter">B</div>
      <div class="txt"></div>
    </div>
    <div class="ansBox" data-pos="2" id="ans2">
      <img src="bowling-game/answer_score_board.png" alt="">
      <div class="letter">C</div>
      <div class="txt"></div>
    </div>
    <div class="ansBox" data-pos="3" id="ans3">
      <img src="bowling-game/answer_score_board.png" alt="">
      <div class="letter">D</div>
      <div class="txt"></div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
      <div class="popup-card">
        <div class="icon" id="popupIcon">🎉</div>
        <h3 id="popupTitle">Strike! Jawaban Benar!</h3>
        <p id="popupExplain"></p>
        <button class="btn btn-green" id="popupBtn" onclick="nextQuestion()">Lanjut ➜</button>
      </div>
    </div>
  </div>

  <div class="final-overlay" id="screenFinal">
    <div class="final-card">
      <div class="big" id="finalEmoji">🏆</div>
      <h2 id="finalTitle">Juara Bowling!</h2>
      <div class="stars" id="finalStars">⭐⭐⭐</div>
      <div class="final-stats">
        <div class="stat"><small>Strike</small><b id="statHit">0</b></div>
        <div class="stat"><small>Meleset</small><b id="statMiss">0</b></div>
        <div class="stat"><small>Skor Akhir</small><b id="statScore">0</b></div>
      </div>
      <p class="msg" id="finalMsg"></p>
      <button class="btn btn-green" onclick="restart()">🔄 Main Lagi</button>
    </div>
  </div>
</div>

<script>
/* ================== DATA ================== */
const QUESTIONS = [
  { q: "5 + 3 = ?", a: ["6","7","8","9"], correct: 2, explain: "5 + 3 = 8" },
  { q: "12 - 4 = ?", a: ["6","7","8","9"], correct: 2, explain: "12 - 4 = 8" },
  { q: "6 × 2 = ?", a: ["10","11","12","13"], correct: 2, explain: "6 × 2 = 12" },
  { q: "20 ÷ 4 = ?", a: ["4","5","6","8"], correct: 0, explain: "20 ÷ 4 = 4" },
  { q: "9 + 6 = ?", a: ["14","15","16","17"], correct: 1, explain: "9 + 6 = 15" },
  { q: "15 - 7 = ?", a: ["7","8","9","10"], correct: 1, explain: "15 - 7 = 8" },
  { q: "7 × 3 = ?", a: ["18","19","20","21"], correct: 3, explain: "7 × 3 = 21" },
  { q: "18 ÷ 3 = ?", a: ["5","6","7","8"], correct: 1, explain: "18 ÷ 3 = 6" },
  { q: "10 + 25 = ?", a: ["30","32","35","40"], correct: 2, explain: "10 + 25 = 35" },
  { q: "100 - 45 = ?", a: ["45","50","55","60"], correct: 2, explain: "100 - 45 = 55" }
];

/* ball travel targets (%) */
const BALL_START_X = 50, BALL_START_Y = 45;
const PIN_TARGET_X = 50, PIN_TARGET_Y = 37;
/* the two decorative side-lane pin racks baked into background.png — a missed
   throw veers into one of these lanes instead of the centered pin cluster */
const MISS_TARGETS = [
  { x: 36.7, y: 38.6 },
  { x: 64.6, y: 38.6 }
];

/* 6-pin cluster offsets (% of canvas) relative to PIN_TARGET */
const PIN_OFFSETS = [
  {dx:-2.0, dy:-1.6}, {dx:0, dy:-1.6}, {dx:2.0, dy:-1.6},
  {dx:-1.0, dy:0},    {dx:1.0, dy:0},
  {dx:0,    dy:1.6}
];

/* ================== STATE ================== */
let order = 0, score = 0, hit = 0, miss = 0;
let shuffledQ = [];

/* ================== HELPERS ================== */
const $ = id => document.getElementById(id);
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ================== PINS SETUP ================== */
function buildPins(){
  const box = $('pins');
  box.innerHTML = '';
  PIN_OFFSETS.forEach((o, i) => {
    const pin = document.createElement('img');
    pin.src = 'bowling-game/pinball.png';
    pin.className = 'pin';
    pin.id = 'pin' + i;
    pin.alt = '';
    box.appendChild(pin);
  });
  resetPins();
}
function resetPins(){
  PIN_OFFSETS.forEach((o, i) => {
    const pin = $('pin' + i);
    pin.style.transition = 'none';
    pin.style.left = (PIN_TARGET_X + o.dx) + '%';
    pin.style.top = (PIN_TARGET_Y + o.dy) + '%';
    pin.style.opacity = '1';
    pin.style.transform = 'translate(-50%,-100%) rotate(0deg)';
    void pin.offsetWidth;
    pin.style.transition = '';
  });
}
function scatterPins(){
  PIN_OFFSETS.forEach((o, i) => {
    const pin = $('pin' + i);
    const dir = Math.random() > 0.5 ? 1 : -1;
    const dx = dir * (4 + Math.random() * 5);
    const dy = -(3 + Math.random() * 5);
    const rot = dir * (120 + Math.random() * 160);
    setTimeout(() => {
      pin.style.transform = `translate(-50%,-100%) translate(${dx}%, ${dy}%) rotate(${rot}deg)`;
      pin.style.opacity = '0';
    }, i * 40);
  });
}

/* ================== FLOW ================== */
function init(){
  shuffledQ = shuffle(QUESTIONS);
  order = 0; score = 0; hit = 0; miss = 0;
  $('gameScore').textContent = 0;
  $('screenFinal').classList.remove('show');
  buildPins();
  showQuestion();
}

function resetBall(){
  const ball = $('ball');
  ball.style.transition = 'none';
  ball.style.left = BALL_START_X + '%';
  ball.style.top = BALL_START_Y + '%';
  ball.style.transform = 'translate(-50%,-50%) scale(1)';
  void ball.offsetWidth;
  ball.style.transition = '';
  $('person').classList.remove('throwing');
  resetPins();
}

function showQuestion(){
  const q = shuffledQ[order];
  $('progressText').textContent = `${order + 1}/${shuffledQ.length}`;

  resetBall();

  $('questionText').textContent = q.q;

  const idxOrder = shuffle([0,1,2,3]);
  idxOrder.forEach((ai, pos) => {
    const el = $('ans' + pos);
    el.querySelector('.txt').textContent = q.a[ai];
    el.classList.remove('correct','wrong','disabled');
    el.onclick = () => handleAnswer(pos, ai === q.correct, q);
  });
}

function handleAnswer(pos, isCorrect, q){
  const q_correctText = q.a[q.correct];
  document.querySelectorAll('.ansBox').forEach(el => {
    el.classList.add('disabled');
    el.onclick = null;
    if(el.querySelector('.txt').textContent.trim() === q_correctText.trim()) el.classList.add('correct');
  });
  if(!isCorrect) $('ans' + pos).classList.add('wrong');

  const ball = $('ball');
  $('person').classList.add('throwing');
  setTimeout(() => $('person').classList.remove('throwing'), 350);

  if(isCorrect){
    ball.style.left = PIN_TARGET_X + '%';
    ball.style.top = PIN_TARGET_Y + '%';
    ball.style.transform = 'translate(-50%,-50%) scale(.55)';
    setTimeout(scatterPins, 900);
  } else {
    const missTarget = MISS_TARGETS[Math.random() > 0.5 ? 0 : 1];
    ball.style.left = missTarget.x + '%';
    ball.style.top = missTarget.y + '%';
    ball.style.transform = 'translate(-50%,-50%) scale(.5)';
  }

  setTimeout(() => showPopup(isCorrect, q), 1300);
}

function showPopup(isCorrect, q){
  if(isCorrect){ score += 100; hit++; } else { miss++; }
  $('gameScore').textContent = score;

  $('popupIcon').textContent = isCorrect ? '🎉' : '😬';
  const t = $('popupTitle');
  t.textContent = isCorrect ? 'Strike! Jawaban Benar!' : 'Meleset! Jawaban Salah!';
  t.className = isCorrect ? 'good' : 'bad';
  $('popupExplain').textContent = isCorrect
    ? '✅ ' + q.explain
    : '❌ Jawaban benar: ' + q.a[q.correct] + ' (' + q.explain + ')';
  $('popupBtn').textContent = (order + 1 >= shuffledQ.length) ? 'Lihat Hasil Akhir 🏁' : 'Lanjut ➜';

  $('popupOverlay').classList.add('show');
}

function nextQuestion(){
  $('popupOverlay').classList.remove('show');
  order++;
  if(order >= shuffledQ.length){ finish(); } else { showQuestion(); }
}

function finish(){
  $('screenFinal').classList.add('show');

  $('statHit').textContent = hit;
  $('statMiss').textContent = miss;
  $('statScore').textContent = score;

  const ratio = hit / shuffledQ.length;
  let emoji, title, stars, msg;
  if(ratio === 1){
    emoji = '🏆'; title = 'Juara Bowling Sempurna!'; stars = '⭐⭐⭐⭐⭐';
    msg = 'Sempurna! Semua lemparan strike. Kamu jago matematika sekaligus jago bowling!';
  } else if(ratio >= .75){
    emoji = '🎳'; title = 'Pembowling Andal!'; stars = '⭐⭐⭐⭐';
    msg = 'Kerja bagus! Hampir semua lemparan strike. Sedikit lagi jadi juara sempurna!';
  } else if(ratio >= .5){
    emoji = '🙂'; title = 'Pembowling Pemula'; stars = '⭐⭐⭐';
    msg = 'Lumayan! Tapi masih ada beberapa lemparan meleset. Yuk asah lagi hitunganmu!';
  } else {
    emoji = '😬'; title = 'Banyak Meleset…'; stars = '⭐';
    msg = 'Waduh, banyak yang meleset! Jangan menyerah, latihan berhitung lagi ya!';
  }
  $('finalEmoji').textContent = emoji;
  $('finalTitle').textContent = title;
  $('finalStars').textContent = stars;
  $('finalMsg').textContent = msg;
}

function restart(){
  init();
}

/* ================== FULLSCREEN TOGGLE ================== */
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement ||
            document.mozFullScreenElement || document.msFullscreenElement);
}
function toggleFullscreen(){
  if(!isFullscreen()){
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen ||
                el.mozRequestFullScreen || el.msRequestFullscreen;
    if(req) req.call(el);
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen ||
                 document.mozCancelFullScreen || document.msExitFullscreen;
    if(exit) exit.call(document);
  }
}
function updateFsBtn(){
  const btn = $('fsBtn');
  const fs = isFullscreen();
  btn.classList.toggle('is-fullscreen', fs);
  btn.title = fs ? 'Keluar Fullscreen' : 'Fullscreen';
  btn.setAttribute('aria-label', btn.title);
}
(function initFullscreenBtn(){
  const btn = $('fsBtn');
  const el = document.documentElement;
  const supported = !!(el.requestFullscreen || el.webkitRequestFullscreen ||
                        el.mozRequestFullScreen || el.msRequestFullscreen);
  if(!supported){ btn.style.display = 'none'; return; }
  btn.addEventListener('click', toggleFullscreen);
  ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange']
    .forEach(evt => document.addEventListener(evt, updateFsBtn));
})();

window.addEventListener('load', init);
</script>
</body>
</html>
