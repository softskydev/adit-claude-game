<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunter Adventure</title>
<style>
  /* ===== FONTS & ROOT VARIABLES ===== */
  @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --sand:       #F5DFA0;
    --sand-dark:  #C8A96E;
    --ocean:      #3AAFDA;
    --ocean-dark: #1A7AA0;
    --jungle:     #4CAF50;
    --jungle-dark:#2E7D32;
    --gold:       #FFD700;
    --gold-dark:  #E6A800;
    --red:        #E53935;
    --brown:      #6D4C41;
    --brown-light:#A1887F;
    --ink:        #2C1A0E;
    --parchment:  #F7EDCC;
    --shadow:     rgba(44,26,14,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #1A7AA0 0%, #0D4F6E 60%, #07293B 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
  }

  /* ===== HEADER ===== */
  #header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
    flex-wrap: wrap;
    gap: 8px;
  }

  #game-title {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(22px, 5vw, 38px);
    color: var(--gold);
    text-shadow: 3px 3px 0 var(--brown), 0 0 20px rgba(255,215,0,0.5);
    letter-spacing: 2px;
    line-height: 1;
  }

  #score-board {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .stat-pill {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,215,0,0.5);
    border-radius: 30px;
    padding: 6px 14px;
    font-weight: 900;
    font-size: 15px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-pill .icon { font-size: 18px; }

  #restart-btn {
    background: var(--red);
    border: 3px solid #b71c1c;
    border-radius: 30px;
    padding: 7px 18px;
    font-family: 'Luckiest Guy', cursive;
    font-size: 14px;
    color: #fff;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 0 #7f0000;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #7f0000; }

  /* ===== PROGRESS BAR ===== */
  #progress-wrap {
    width: 100%;
    max-width: 900px;
    padding: 0 20px 10px;
  }
  #progress-label {
    font-weight: 900;
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 5px;
    letter-spacing: 1px;
  }
  #progress-track {
    width: 100%;
    height: 18px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    border: 2px solid rgba(255,215,0,0.4);
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), #fff8c0);
    border-radius: 10px;
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 10px rgba(255,215,0,0.6);
  }

  /* ===== MAP CONTAINER ===== */
  #map-wrap {
    width: 100%;
    max-width: 900px;
    padding: 0 12px 20px;
    position: relative;
  }

  #map-svg {
    width: 100%;
    border-radius: 18px;
    border: 5px solid var(--brown);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(200,169,110,0.3);
    display: block;
    cursor: default;
  }

  /* ===== TREASURE SPOTS on SVG ===== */
  .t-spot { cursor: pointer; }
  .t-chest { transition: transform 0.3s; transform-origin: center; }
  .t-chest:hover { transform: scale(1.1); }

  /* ===== PARTICLE CANVAS ===== */
  #particle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  /* ===== CHARACTER ===== */
  #character-wrap {
    position: absolute;
    width: 60px;
    height: 60px;
    transition: left 1.2s cubic-bezier(0.34,1.1,0.64,1), top 1.2s cubic-bezier(0.34,1.1,0.64,1);
    transform: translate(-50%, -100%);
    z-index: 10;
    pointer-events: none;
  }

  #character-wrap.digging { animation: digAnim 0.5s ease-in-out 4 alternate; }
  #character-wrap.dancing { animation: danceAnim 0.3s ease-in-out infinite alternate; }

  @keyframes digAnim {
    0%   { transform: translate(-50%,-100%) rotate(-15deg); }
    100% { transform: translate(-50%,-100%) rotate(15deg); }
  }
  @keyframes danceAnim {
    0%   { transform: translate(-50%,-100%) scale(1) rotate(-5deg); }
    100% { transform: translate(-50%,-100%) scale(1.1) rotate(5deg); }
  }

  /* ===== FAILURE ITEM ===== */
  #fail-item {
    position: absolute;
    font-size: 40px;
    z-index: 20;
    pointer-events: none;
    display: none;
    animation: popUp 0.5s cubic-bezier(0.34,1.7,0.64,1);
    transform: translate(-50%, -100%);
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
  }
  @keyframes popUp {
    0%   { transform: translate(-50%,-60%) scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: translate(-50%,-120%) scale(1) rotate(10deg); opacity: 1; }
  }

  /* ===== MODAL OVERLAY ===== */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,10,5,0.75);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(3px);
  }
  #modal-overlay.hidden { display: none; }

  #modal-box {
    background: var(--parchment);
    border: 5px solid var(--brown);
    border-radius: 20px;
    max-width: 520px;
    width: 100%;
    padding: 30px 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 40px rgba(200,169,110,0.2);
    position: relative;
    animation: modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }
  @keyframes modalIn {
    0%   { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg);   opacity: 1; }
  }

  #modal-compass {
    position: absolute;
    top: -22px; right: -22px;
    font-size: 44px;
    animation: spin 8s linear infinite;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #q-number {
    font-family: 'Luckiest Guy', cursive;
    color: var(--brown-light);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  #q-text {
    font-weight: 900;
    font-size: clamp(17px, 3.5vw, 22px);
    color: var(--ink);
    margin-bottom: 20px;
    line-height: 1.35;
  }

  #answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .ans-btn {
    background: linear-gradient(135deg, #fff8e7, #f0dfa0);
    border: 3px solid var(--brown-light);
    border-radius: 12px;
    padding: 13px 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(13px, 2.5vw, 16px);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 9px;
    transition: transform 0.1s, background 0.15s, border-color 0.15s;
    box-shadow: 0 3px 0 var(--sand-dark);
  }
  .ans-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, #fff, #ffe87a);
    border-color: var(--gold-dark);
    transform: translateY(-2px);
    box-shadow: 0 5px 0 var(--sand-dark);
  }
  .ans-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
  .ans-btn:disabled { cursor: default; opacity: 0.8; }
  .ans-btn.correct { background: linear-gradient(135deg, #c8ffb0, #7de870) !important; border-color: #2e7d32 !important; }
  .ans-btn.wrong   { background: linear-gradient(135deg, #ffb3b3, #ff6060) !important; border-color: #b71c1c !important; }

  .ans-letter {
    background: var(--brown);
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  /* ===== FEEDBACK BANNER ===== */
  #feedback-banner {
    margin-top: 18px;
    border-radius: 10px;
    padding: 12px 16px;
    font-weight: 900;
    font-size: 15px;
    display: none;
    align-items: center;
    gap: 10px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:translateY(0); } }
  #feedback-banner.correct { display:flex; background:#d4f7c0; border:2px solid #4caf50; color:#1b5e20; }
  #feedback-banner.wrong   { display:flex; background:#ffe0e0; border:2px solid #ef5350; color:#7f0000; }
  #feedback-icon { font-size: 22px; }

  /* ===== WIN SCREEN ===== */
  #win-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: radial-gradient(ellipse at 50% 40%, #7B3F00 0%, #3E1A00 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  #win-screen.hidden { display: none; }

  #win-title {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(36px, 9vw, 80px);
    color: var(--gold);
    text-shadow: 4px 4px 0 #7B3F00, 0 0 40px rgba(255,215,0,0.8);
    line-height: 1;
    animation: pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }

  #win-treasure-svg { width: min(340px, 90vw); margin: 20px 0; }

  #win-score {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(20px, 5vw, 36px);
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    margin-bottom: 24px;
  }

  #play-again-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: 4px solid var(--brown);
    border-radius: 40px;
    padding: 14px 40px;
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(18px, 4vw, 26px);
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 6px 0 var(--brown), 0 0 30px rgba(255,215,0,0.4);
    transition: transform 0.1s;
  }
  #play-again-btn:hover { transform: scale(1.05); }
  #play-again-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--brown); }

  /* ===== START SCREEN ===== */
  #start-screen {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: radial-gradient(ellipse at 50% 30%, #1a6e3c 0%, #0d4a28 50%, #061f10 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  #start-screen.hidden { display: none; }

  #start-title {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(36px, 10vw, 82px);
    color: var(--gold);
    text-shadow: 5px 5px 0 #7B3F00, 0 0 50px rgba(255,215,0,0.7);
    line-height: 1.05;
    letter-spacing: 3px;
    animation: titleBob 2s ease-in-out infinite alternate;
  }
  @keyframes titleBob {
    from { transform: translateY(0) rotate(-1deg); }
    to   { transform: translateY(-10px) rotate(1deg); }
  }

  #start-subtitle {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(14px, 3vw, 20px);
    color: #A5D6A7;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
    margin-bottom: 28px;
    opacity: 0.9;
  }

  #start-map-preview {
    width: min(320px, 80vw);
    margin-bottom: 32px;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
    animation: floatPrev 3s ease-in-out infinite alternate;
  }
  @keyframes floatPrev {
    from { transform: translateY(0) rotate(-2deg); }
    to   { transform: translateY(-12px) rotate(2deg); }
  }

  #start-info {
    font-size: clamp(13px, 2.5vw, 16px);
    color: #C8E6C9;
    font-weight: 700;
    margin-bottom: 32px;
    opacity: 0.85;
    max-width: 340px;
    line-height: 1.6;
  }

  #start-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: 4px solid var(--brown);
    border-radius: 50px;
    padding: 18px 52px;
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(22px, 5vw, 34px);
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 8px 0 #7B3F00, 0 0 40px rgba(255,215,0,0.5);
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
    overflow: hidden;
  }
  #start-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%);
    border-radius: inherit;
  }
  #start-btn:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 12px 0 #7B3F00, 0 0 60px rgba(255,215,0,0.6); }
  #start-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #7B3F00; }

  #start-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star-dot {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    #answers-grid { grid-template-columns: 1fr; }
    #modal-box { padding: 22px 16px 18px; }
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">
  <div id="start-stars"></div>

  <div id="start-title">🗺️ TREASURE<br>HUNTER</div>
  <div id="start-subtitle">⚓ Adventure Awaits ⚓</div>

  <!-- Mini map illustration -->
  <svg id="start-map-preview" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="sg-ocean" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#4FC3F7"/>
        <stop offset="100%" stop-color="#0277BD"/>
      </radialGradient>
      <radialGradient id="sg-island" cx="45%" cy="40%" r="55%">
        <stop offset="0%" stop-color="#AED581"/>
        <stop offset="100%" stop-color="#558B2F"/>
      </radialGradient>
    </defs>
    <rect width="320" height="200" fill="url(#sg-ocean)" rx="14" stroke="#C8A96E" stroke-width="5"/>
    <path d="M55,55 Q100,20 165,30 Q225,10 270,55 Q305,80 295,125
             Q285,165 245,175 Q195,190 145,178 Q90,188 58,148 Q28,120 55,55Z"
          fill="url(#sg-island)" stroke="#D4A855" stroke-width="8"/>
    <!-- Palm -->
    <g transform="translate(85,75)">
      <rect x="-3" y="-35" width="6" height="40" rx="3" fill="#8D6E63"/>
      <ellipse cx="-14" cy="-38" rx="20" ry="8" fill="#66BB6A" transform="rotate(-20)"/>
      <ellipse cx="8"   cy="-42" rx="20" ry="8" fill="#81C784" transform="rotate(15)"/>
    </g>
    <g transform="translate(240,65)">
      <rect x="-3" y="-35" width="6" height="40" rx="3" fill="#8D6E63"/>
      <ellipse cx="-14" cy="-38" rx="18" ry="7" fill="#66BB6A" transform="rotate(-20)"/>
      <ellipse cx="8"   cy="-42" rx="18" ry="7" fill="#81C784" transform="rotate(15)"/>
    </g>
    <!-- Chest -->
    <g transform="translate(148,108)">
      <rect x="0" y="10" width="36" height="24" rx="4" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
      <rect x="0" y="0"  width="36" height="15" rx="4" fill="#A1887F" stroke="#5D4037" stroke-width="2" transform="rotate(-20, 18, 8)"/>
      <rect x="12" y="12" width="12" height="10" rx="2" fill="#FFD700" stroke="#E65100" stroke-width="1.5"/>
    </g>
    <!-- X marks -->
    <text x="108" y="148" font-size="18" fill="#C62828" font-weight="bold">✕</text>
    <text x="220" y="130" font-size="18" fill="#C62828" font-weight="bold">✕</text>
    <text x="140" y="75"  font-size="18" fill="#C62828" font-weight="bold">✕</text>
    <!-- Dotted paths -->
    <g stroke="#C8A96E" stroke-width="2" stroke-dasharray="6,5" fill="none" opacity="0.7">
      <path d="M118,142 Q155,120 165,115"/>
      <path d="M165,115 Q200,120 228,124"/>
      <path d="M165,115 Q155,95 148,78"/>
    </g>
    <!-- Compass -->
    <g transform="translate(280,165)" opacity="0.8">
      <circle r="18" fill="#F5DFA0" stroke="#C8A96E" stroke-width="2"/>
      <text text-anchor="middle" y="-8" font-size="8" font-weight="bold" fill="#4E342E">N</text>
      <text text-anchor="middle" y="14" font-size="8" font-weight="bold" fill="#4E342E">S</text>
      <polygon points="0,-13 2,0 0,-2 -2,0" fill="#C62828"/>
      <polygon points="0,13  2,0 0, 2 -2,0" fill="#4E342E"/>
    </g>
  </svg>

  <div id="start-info">
    🏝️ Explore a tropical island<br>
    ❓ Answer 8 quiz questions<br>
    💰 Collect all 8 treasures to win!
  </div>

  <button id="start-btn" onclick="startGame()">⚔️ START ADVENTURE</button>
</div>

<!-- PARTICLE CANVAS (coins, sparks) -->
<canvas id="particle-canvas"></canvas>

<!-- HEADER -->
<div id="header">
  <div id="game-title">🗺️ Treasure Hunter</div>
  <div id="score-board">
    <div class="stat-pill"><span class="icon">💎</span><span id="score-val">0</span></div>
    <div class="stat-pill"><span class="icon">🏆</span><span id="found-val">0</span>/8</div>
    <button id="restart-btn" onclick="restartGame()">↺ RESTART</button>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progress-wrap">
  <div id="progress-label">⚡ TREASURE PROGRESS</div>
  <div id="progress-track"><div id="progress-bar"></div></div>
</div>

<!-- MAP -->
<div id="map-wrap">
  <!-- CHARACTER -->
  <div id="character-wrap" style="left:15%;top:85%">
    <svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <ellipse cx="30" cy="55" rx="15" ry="18" fill="#E65100"/>
      <!-- Legs -->
      <rect x="19" y="66" width="9" height="14" rx="4" fill="#5D4037"/>
      <rect x="32" y="66" width="9" height="14" rx="4" fill="#5D4037"/>
      <!-- Boots -->
      <ellipse cx="23" cy="80" rx="7" ry="4" fill="#3E2723"/>
      <ellipse cx="37" cy="80" rx="7" ry="4" fill="#3E2723"/>
      <!-- Arms -->
      <ellipse cx="14" cy="52" rx="5" ry="12" fill="#E65100" transform="rotate(15 14 52)"/>
      <ellipse cx="46" cy="52" rx="5" ry="12" fill="#E65100" transform="rotate(-15 46 52)"/>
      <!-- Shovel -->
      <rect x="47" y="38" width="4" height="28" rx="2" fill="#8D6E63"/>
      <ellipse cx="49" cy="67" rx="6" ry="4" fill="#9E9E9E"/>
      <!-- Head -->
      <circle cx="30" cy="26" r="18" fill="#FFCC80"/>
      <!-- Hat -->
      <rect x="14" y="14" width="32" height="6" rx="3" fill="#4E342E"/>
      <rect x="19" y="2"  width="22" height="16" rx="4" fill="#5D4037"/>
      <rect x="16" y="13" width="4" height="4" fill="#FFD700"/>
      <!-- Eyes -->
      <circle cx="23" cy="27" r="3.5" fill="#fff"/>
      <circle cx="37" cy="27" r="3.5" fill="#fff"/>
      <circle cx="24" cy="27" r="2"   fill="#2C1A0E"/>
      <circle cx="38" cy="27" r="2"   fill="#2C1A0E"/>
      <!-- Smile -->
      <path d="M23 34 Q30 40 37 34" stroke="#2C1A0E" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Cheeks -->
      <ellipse cx="20" cy="32" rx="4" ry="2.5" fill="#FF8A65" opacity="0.6"/>
      <ellipse cx="40" cy="32" rx="4" ry="2.5" fill="#FF8A65" opacity="0.6"/>
    </svg>
  </div>

  <!-- FAILURE ITEM -->
  <div id="fail-item"></div>

  <!-- MAP SVG -->
  <svg id="map-svg" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
    <!-- Parchment BG -->
    <defs>

<script>

// ===== QUESTION BANK (add more here to expand!) =====

  {

    options: ["Malam hari", "Sore hari", "Siang hari", "Pagi hari"],
    correct: 3,
    fact: "Selamat pagi diucapkan saat matahari baru terbit. Sopan dan menyenangkan!"
  }
];

// Map spot positions as percentages of SVG viewBox (cx/cy → % of 800×520)
const SPOT_POSITIONS = [
  { cx: 230, cy: 355 }, // spot-0
  { cx: 640, cy: 155 }, // spot-1
  { cx: 480, cy: 105 }, // spot-2
  { cx: 680, cy: 260 }, // spot-3
  { cx: 440, cy: 285 }, // spot-4
  { cx: 240, cy: 190 }, // spot-5
  { cx: 560, cy: 390 }, // spot-6
  { cx: 320, cy: 420 }, // spot-7
];

// Failure items to pop up on wrong answers
const FAIL_ITEMS = ["💀", "👢", "🪣", "🐛", "🦴", "🪨", "🐟", "🧦"];

// ===== GAME STATE =====
let currentQ = 0;
let score = 0;
let found = 0;
let answered = false;
let animating = false;

// Shuffle QUESTIONS to randomize order each game
let questionOrder = [];

// ===== DOM REFS =====
const overlay     = document.getElementById('modal-overlay');
const qNumber     = document.getElementById('q-number');
const qText       = document.getElementById('q-text');

const feedbackEl  = document.getElementById('feedback-banner');
const feedbackIcon= document.getElementById('feedback-icon');
const feedbackTxt = document.getElementById('feedback-text');
const scoreVal    = document.getElementById('score-val');
const foundVal    = document.getElementById('found-val');

const charWrap    = document.getElementById('character-wrap');
const failItem    = document.getElementById('fail-item');

const canvas      = document.getElementById('particle-canvas');
const ctx         = canvas.getContext('2d');

// ===== CANVAS SIZE =====
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===== PARTICLES =====
let particles = [];

function spawnCoins(x, y, count = 24) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      radius: 5 + Math.random() * 6,
      color: ['#FFD700','#FFC107','#FFEB3B','#FF8F00'][Math.floor(Math.random()*4)],
      life: 1, decay: 0.018 + Math.random() * 0.015,
      gravity: 0.3,
      type: 'coin'
    });
  }
}

function spawnSparks(x, y, count = 16) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      radius: 3 + Math.random() * 3,
      color: ['#FF5722','#FF9800','#FFEB3B'][Math.floor(Math.random()*3)],
      life: 1, decay: 0.03,
      gravity: 0.15,
      type: 'spark'
    });
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath();
    if (p.type === 'coin') {
      // Draw a flat ellipse (coin)
      ctx.ellipse(p.x, p.y, p.radius, p.radius * 0.5, p.vx * 0.2, 0, Math.PI * 2);
    } else {
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    }
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 8;
    ctx.fill();
    ctx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===== UTILITY: Get map spot screen position =====
function getSpotScreenPos(spotIndex) {
  const mapSvgEl = document.getElementById('map-svg');
  const rect = mapSvgEl.getBoundingClientRect();
  const sp   = SPOT_POSITIONS[spotIndex];
  const mapWrap = document.getElementById('map-wrap');
  const wrapRect = mapWrap.getBoundingClientRect();
  // SVG viewBox is 800×520; scale to rendered size
  const scaleX = rect.width  / 800;
  const scaleY = rect.height / 520;
  const x = rect.left + sp.cx * scaleX - wrapRect.left;
  const y = rect.top  + sp.cy * scaleY - wrapRect.top;
  return { x, y };
}

// ===== MOVE CHARACTER =====
function moveCharacter(spotIndex, callback) {
  const pos = getSpotScreenPos(spotIndex);
  charWrap.style.left = pos.x + 'px';
  charWrap.style.top  = pos.y + 'px';
  setTimeout(callback, 1300); // wait for transition
}

// ===== OPEN CHEST =====
function openChest(spotIndex) {
  const chest = document.getElementById('chest-' + spotIndex);
  if (!chest) return;
  chest.removeAttribute('display');
  // Animate lid opening by shifting the top rect
  const lid = chest.children[1]; // second rect = lid
  lid.setAttribute('transform', 'rotate(-35, 0, 8)');
  lid.style.transition = 'transform 0.4s';
  // spawn coins at chest screen pos
  const pos = getSpotScreenPos(spotIndex);
  const mapWrapRect = document.getElementById('map-wrap').getBoundingClientRect();
  spawnCoins(
    mapWrapRect.left + pos.x,
    mapWrapRect.top  + pos.y,
    30
  );
  // Mark spot circle as collected
  const circle = document.querySelector('#spot-' + spotIndex + ' circle');
  if (circle) {
    circle.setAttribute('fill', '#81C784');
    circle.setAttribute('stroke', '#2E7D32');
  }
}

// ===== SHOW FAIL ITEM =====
function showFailItem(spotIndex) {
  const pos = getSpotScreenPos(spotIndex);
  failItem.style.left    = pos.x + 'px';
  failItem.style.top     = (pos.y - 10) + 'px';
  failItem.style.display = 'block';
  failItem.textContent   = FAIL_ITEMS[Math.floor(Math.random() * FAIL_ITEMS.length)];
  setTimeout(() => { failItem.style.display = 'none'; }, 2000);
}

// ===== LOAD QUESTION =====
function loadQuestion() {
  if (currentQ >= QUESTIONS.length) { showWin(); return; }
  const qi = questionOrder[currentQ];
  const q  = QUESTIONS[qi];
  answered = false;
  feedbackEl.className = 'hidden'; // hide feedback
  feedbackEl.style.display = 'none';

  qNumber.textContent = `QUESTION ${currentQ + 1} OF ${QUESTIONS.length}`;
  qText.textContent   = q.q;

  // Shuffle answer options for display
  const shuffled = q.options.map((opt, i) => ({ opt, orig: i }))
                            .sort(() => Math.random() - 0.5);

  ['A','B','C','D'].forEach((letter, i) => {
    const btn = ansBtns[i];
    btn.querySelector('.ans-letter').textContent = letter;
    btn.querySelector('span:last-child').textContent = shuffled[i].opt;
    btn.dataset.origIndex = shuffled[i].orig;
    btn.disabled = false;
    btn.className = 'ans-btn';
  });

  overlay.classList.remove('hidden');
}

// ===== SUBMIT ANSWER =====
function submitAnswer(btnIndex) {
  if (answered || animating) return;
  answered = true;
  animating = true;

  const qi  = questionOrder[currentQ];
  const q   = QUESTIONS[qi];
  const btn = ansBtns[btnIndex];
  const chosenOrig = parseInt(btn.dataset.origIndex);
  const isCorrect  = chosenOrig === q.correct;

  // Disable all buttons
  ansBtns.forEach(b => b.disabled = true);

  // Highlight correct/wrong
  ansBtns.forEach(b => {
    if (parseInt(b.dataset.origIndex) === q.correct) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  // Show feedback
  feedbackEl.style.display = 'flex';
  if (isCorrect) {
    feedbackEl.className = 'correct';
    feedbackIcon.textContent = '🎉';
    feedbackTxt.textContent  = q.fact || 'Correct! Well done, explorer!';
    score += 100;
    scoreVal.textContent = score;
  } else {
    feedbackEl.className = 'wrong';
    feedbackIcon.textContent = '💀';
    feedbackTxt.textContent  = `Oops! The answer was: "${q.options[q.correct]}"`;
  }

  // After delay, close modal and animate
  setTimeout(() => {
    overlay.classList.add('hidden');

    const spotIdx = currentQ; // 1-to-1 mapping: question N → spot N

    // Move character to spot
    moveCharacter(spotIdx, () => {
      if (isCorrect) {
        // SUCCESS: open chest
        charWrap.classList.add('dancing');
        openChest(spotIdx);
        found++;
        foundVal.textContent = found;
        progressBar.style.width = (found / 8 * 100) + '%';
        setTimeout(() => {
          charWrap.classList.remove('dancing');
          currentQ++;
          animating = false;
          if (currentQ >= QUESTIONS.length) { showWin(); }
          else { loadQuestion(); }
        }, 1800);
      } else {
        // FAIL: dig animation + junk
        charWrap.classList.add('digging');
        showFailItem(spotIdx);
        // Spawn sparks (dirt)
        const pos = getSpotScreenPos(spotIdx);
        const wr = document.getElementById('map-wrap').getBoundingClientRect();
        spawnSparks(wr.left + pos.x, wr.top + pos.y, 20);
        setTimeout(() => {
          charWrap.classList.remove('digging');
          currentQ++;
          animating = false;
          if (currentQ >= QUESTIONS.length) { showWin(); }
          else { loadQuestion(); }
        }, 2000);
      }
    });
  }, 1800);
}

// ===== WIN SCREEN =====
function showWin() {
  overlay.classList.add('hidden');
  winScreen.classList.remove('hidden');
  finalScore.textContent = score;
  // Massive coin burst from center
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      spawnCoins(window.innerWidth / 2, window.innerHeight / 2, 40);
    }, i * 350);
  }
}

// ===== RESTART =====
function restartGame() {
  // Reset state
  currentQ = 0; score = 0; found = 0; answered = false; animating = false;
  scoreVal.textContent = 0;
  foundVal.textContent = 0;
  progressBar.style.width = '0%';

  // Reset character position
  charWrap.style.transition = 'none';
  charWrap.style.left = '15%';
  charWrap.style.top  = '85%';
  charWrap.className  = '';
  setTimeout(() => { charWrap.style.transition = ''; }, 50);

  // Reset chests and spot circles
  for (let i = 0; i < 8; i++) {
    const chest = document.getElementById('chest-' + i);
    if (chest) {
      chest.setAttribute('display', 'none');
      const lid = chest.children[1];
      lid.removeAttribute('transform');
    }
    const circle = document.querySelector('#spot-' + i + ' circle');
    if (circle) {
      circle.setAttribute('fill', '#F9A825');
      circle.setAttribute('stroke', '#E65100');
    }
  }

  // Hide win screen
  winScreen.classList.add('hidden');

  // Shuffle question order
  questionOrder = [...Array(QUESTIONS.length).keys()].sort(() => Math.random() - 0.5);

  // Hide fail item
  failItem.style.display = 'none';
  particles = [];

  // Show start screen instead of jumping straight to question
  const startScreen = document.getElementById('start-screen');
  startScreen.classList.remove('hidden');
}

// ===== START SCREEN: spawn twinkling stars =====
(function spawnStars() {
  const container = document.getElementById('start-stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    const size = 2 + Math.random() * 3;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${1.2 + Math.random()*2.5}s;
      animation-delay:${Math.random()*3}s;
    `;
    container.appendChild(s);
  }
})();

// ===== START GAME (from splash screen) =====
function startGame() {
  const startScreen = document.getElementById('start-screen');
  startScreen.style.transition = 'opacity 0.5s';
  startScreen.style.opacity = '0';
  setTimeout(() => {
    startScreen.classList.add('hidden');
    startScreen.style.opacity = '';
    startScreen.style.transition = '';
    loadQuestion(); // show first question
  }, 500);
}

// ===== INIT: show start screen, do NOT auto-open modal =====
// Pre-shuffle questions and reset state, but don't open modal yet
(function init() {
  // Reset state
  currentQ = 0; score = 0; found = 0; answered = false; animating = false;
  scoreVal.textContent = 0;
  foundVal.textContent = 0;
  progressBar.style.width = '0%';
  // Shuffle questions
  questionOrder = [...Array(QUESTIONS.length).keys()].sort(() => Math.random() - 0.5);
  // Keep modal hidden — wait for Start button
  overlay.classList.add('hidden');
})();
</script>
