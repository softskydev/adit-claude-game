<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Dig — Fossil Excavation Quiz</title>
<style>
  /* ============================================================
     CSS VARIABLES & RESET
  ============================================================ */
  :root {
    --sand-light: #f5d98a;
    --sand-mid: #e6b84a;
    --sand-dark: #c89030;
    --soil-top: #8B6914;
    --soil-mid: #6b4f0a;
    --soil-deep: #4a3206;
    --sky-top: #87ceeb;
    --sky-bot: #fde68a;
    --rock-gray: #9ca3af;
    --bone-white: #f5f0e8;
    --bone-shadow: #c8b99a;
    --accent-gold: #fbbf24;
    --accent-green: #22c55e;
    --accent-red: #ef4444;
    --text-dark: #1c1408;
    --text-light: #fff8ee;
    --modal-bg: rgba(28, 20, 8, 0.75);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: var(--sky-top);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ============================================================
     GAME SCENE LAYOUT
  ============================================================ */
  #game-scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* SKY */
  #sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 42%;
    background: linear-gradient(180deg, #5bb3e8 0%, #a8d8f0 60%, #fde68a 100%);
    z-index: 0;
  }

  /* SUN */
  #sun {
    position: absolute;
    top: 5%; right: 8%;
    width: clamp(50px,8vw,90px);
    height: clamp(50px,8vw,90px);
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #fff7aa, #fbbf24 50%, #f59e0b);
    box-shadow: 0 0 30px 10px rgba(251,191,36,0.45);
    animation: sun-pulse 4s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes sun-pulse {
    0%,100%{box-shadow:0 0 30px 10px rgba(251,191,36,0.45)}
    50%{box-shadow:0 0 55px 22px rgba(251,191,36,0.6)}
  }

  /* CLOUDS */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    z-index: 1;
  }
  .cloud::before,.cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  #cloud1 { width: 100px; height: 36px; top: 8%; left: 5%; animation: drift 22s linear infinite; }
  #cloud1::before { width: 56px; height: 56px; top: -28px; left: 14px; }
  #cloud1::after  { width: 38px; height: 38px; top: -18px; left: 45px; }
  #cloud2 { width: 75px; height: 28px; top: 15%; left: 30%; animation: drift 30s linear infinite 6s; }
  #cloud2::before { width: 42px; height: 42px; top: -22px; left: 10px; }
  #cloud2::after  { width: 30px; height: 30px; top: -14px; left: 35px; }
  @keyframes drift {
    0%   { transform: translateX(0); }
    50%  { transform: translateX(25px); }
    100% { transform: translateX(0); }
  }

  /* GROUND LAYERS */
  #ground-surface {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 62%;
    z-index: 2;
  }

  /* Grassy top strip */
  .grass-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%);
    border-radius: 0 0 0 0;
    z-index: 5;
  }
  .grass-strip::after {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 0; right: 0;
    height: 10px;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 12px,
      #4ade80 12px, #4ade80 14px
    );
  }

  /* Dirt layers */
  .dirt-layer-1 {
    position: absolute;
    top: 28px; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(180deg, #a16207 0%, #92400e 60%, #78350f 100%);
  }
  .dirt-layer-2 {
    position: absolute;
    top: calc(28px + 35%); left: 0; right: 0;
    bottom: 0;
    background: linear-gradient(180deg, #78350f 0%, #451a03 100%);
  }

  /* Pebble texture decoration */
  .pebble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #d1b285, #9a7c55);
    opacity: 0.5;
  }

  /* ============================================================
     EXCAVATION PIT
  ============================================================ */
  #pit {
    position: absolute;
    left: 50%;
    top: 10%;
    transform: translateX(-50%);
    width: clamp(260px, 55vw, 600px);
    height: clamp(200px, 48vh, 420px);
    background: radial-gradient(ellipse at 50% 30%, #c89030 0%, #8B6914 45%, #6b4f0a 100%);
    border-radius: 45% 45% 30% 30% / 30% 30% 50% 50%;
    box-shadow: inset 0 8px 32px rgba(0,0,0,0.35), 0 4px 18px rgba(0,0,0,0.25);
    z-index: 3;
    overflow: hidden;
  }

  /* Grid lines inside pit for depth */
  #pit::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(0,0,0,0.06) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.06) 40px);
  }

  /* ============================================================
     FOSSIL SKELETON
  ============================================================ */
  #skeleton-container {
    position: absolute;
    inset: 0;
    z-index: 4;
  }

  .fossil-bone {
    position: absolute;
    opacity: 0;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: scale(0.6);
  }
  .fossil-bone.revealed {
    opacity: 1;
    transform: scale(1);
  }

  /* T-Rex skeleton SVG pieces laid out inside pit */
  /* Positions are percentage-based relative to #pit */

  /* ============================================================
     DIG ANIMATIONS
  ============================================================ */
  #dig-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    display: none;
  }

  .pick-anim {
    position: absolute;
    font-size: clamp(2.5rem, 6vw, 4rem);
    animation: pick-swing 0.5s ease-in-out;
    transform-origin: bottom right;
  }
  @keyframes pick-swing {
    0%   { transform: rotate(-40deg); }
    50%  { transform: rotate(20deg); }
    100% { transform: rotate(-40deg); }
  }

  /* Dust cloud */
  .dust {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(210,180,140,0.85) 0%, transparent 70%);
    animation: dust-puff 0.8s ease-out forwards;
  }
  @keyframes dust-puff {
    0%   { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  /* Coin particle */
  .coin {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fef08a, #eab308);
    border: 2px solid #d97706;
    animation: coin-fly 0.9s ease-out forwards;
  }
  @keyframes coin-fly {
    0%   { transform: translate(0,0) scale(0.5) rotate(0deg); opacity:1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.1) rotate(360deg); opacity:0; }
  }

  /* Sparkle */
  .sparkle {
    position: absolute;
    width: 8px; height: 8px;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    background: #fbbf24;
    animation: sparkle-anim 0.7s ease-out forwards;
  }
  @keyframes sparkle-anim {
    0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity:1; }
    60%  { opacity:1; }
    100% { transform: translate(var(--sdx), var(--sdy)) scale(1.5) rotate(180deg); opacity:0; }
  }

  /* Rock reveal */
  .rock-reveal {
    position: absolute;
    border-radius: 40% 50% 45% 55%;
    background: radial-gradient(circle at 40% 35%, #d1d5db, #6b7280);
    animation: rock-drop 0.6s cubic-bezier(.36,.07,.19,.97) forwards;
  }
  @keyframes rock-drop {
    0%   { transform: translateY(-30px) scale(0.5); opacity:0; }
    60%  { transform: translateY(5px) scale(1.05); opacity:1; }
    100% { transform: translateY(0) scale(1); opacity:1; }
  }

  /* Wrong flash */
  #wrong-flash {
    position: fixed;
    inset: 0;
    background: rgba(239,68,68,0.25);
    pointer-events: none;
    opacity: 0;
    z-index: 200;
  }
  #wrong-flash.flash {
    animation: red-flash 0.5s ease-out forwards;
  }
  @keyframes red-flash {
    0%   { opacity:1; }
    100% { opacity:0; }
  }

  /* ============================================================
     HUD (score / progress)
  ============================================================ */
  #hud {
    position: fixed;
    top: 12px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    z-index: 100;
    pointer-events: none;
  }

  .hud-pill {
    background: linear-gradient(135deg, #451a03ee, #78350fee);
    color: var(--accent-gold);
    border: 2px solid var(--accent-gold);
    border-radius: 30px;
    padding: 6px 18px;
    font-size: clamp(0.75rem, 2.5vw, 1rem);
    font-weight: bold;
    letter-spacing: 0.04em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    pointer-events: all;
  }

  #restart-btn {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: white;
    border: 2px solid #4ade80;
    border-radius: 30px;
    padding: 6px 18px;
    font-size: clamp(0.75rem, 2.5vw, 0.95rem);
    font-weight: bold;
    cursor: pointer;
    pointer-events: all;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #restart-btn:hover { transform: scale(1.06); box-shadow: 0 4px 14px rgba(0,0,0,0.3); }

  /* Progress bones row */
  #bones-row {
    position: fixed;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 100;
    background: rgba(69,26,3,0.7);
    border: 2px solid var(--sand-mid);
    border-radius: 30px;
    padding: 6px 14px;
  }

  .bone-pip {
    width: clamp(18px, 3.5vw, 26px);
    height: clamp(18px, 3.5vw, 26px);
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    transition: background 0.4s, border-color 0.4s, transform 0.3s;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
  }
  .bone-pip.found {
    background: radial-gradient(circle, #fef08a, #eab308);
    border-color: #d97706;
    transform: scale(1.15);
  }

  /* ============================================================
     QUESTION MODAL
  ============================================================ */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--modal-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    backdrop-filter: blur(3px);
    padding: 16px;
  }
  #modal-overlay.hidden { display: none; }

  #modal-box {
    background: linear-gradient(160deg, #fef3c7, #fde68a 40%, #fbbf24 100%);
    border: 4px solid #d97706;
    border-radius: 24px;
    padding: clamp(18px, 4vw, 36px);
    max-width: 560px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
    animation: modal-pop 0.35s cubic-bezier(.175,.885,.32,1.275) forwards;
  }
  @keyframes modal-pop {
    0%   { transform: scale(0.6) translateY(30px); opacity:0; }
    100% { transform: scale(1)   translateY(0);    opacity:1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .modal-icon { font-size: clamp(1.8rem, 5vw, 2.4rem); }
  .modal-title {
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    color: #92400e;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .q-counter {
    margin-left: auto;
    font-size: 0.8rem;
    color: #78350f;
    font-weight: bold;
  }

  #question-text {
    font-size: clamp(1rem, 3vw, 1.25rem);
    color: #1c1408;
    margin-bottom: 20px;
    line-height: 1.5;
    font-weight: bold;
  }

  #answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .answer-btn {
    background: linear-gradient(145deg, #fff8ee, #fef3c7);
    border: 2.5px solid #d97706;
    border-radius: 14px;
    padding: clamp(10px, 2.5vw, 16px) clamp(8px, 2vw, 14px);
    font-size: clamp(0.85rem, 2.2vw, 1rem);
    color: #451a03;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-weight: bold;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    text-align: center;
    line-height: 1.35;
  }
  .answer-btn:hover {
    background: linear-gradient(145deg, #fde68a, #fbbf24);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(217,119,6,0.3);
  }
  .answer-btn:active { transform: scale(0.97); }

  /* ============================================================
     WIN SCREEN
  ============================================================ */
  #win-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #451a03 0%, #1c0a00 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    gap: 20px;
    padding: 24px;
  }
  #win-screen.hidden { display: none; }

  .win-dino {
    font-size: clamp(4rem, 12vw, 8rem);
    animation: dino-dance 0.6s ease-in-out infinite alternate;
  }
  @keyframes dino-dance {
    0%   { transform: rotate(-8deg) scale(1); }
    100% { transform: rotate(8deg)  scale(1.08); }
  }

  .win-title {
    font-size: clamp(1.8rem, 6vw, 3.5rem);
    color: var(--accent-gold);
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    font-weight: bold;
  }
  .win-sub {
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #fde68a;
    text-align: center;
  }
  .win-score {
    font-size: clamp(1.3rem, 4vw, 2rem);
    color: white;
    background: rgba(255,255,255,0.1);
    border: 2px solid var(--accent-gold);
    border-radius: 20px;
    padding: 12px 32px;
    text-align: center;
  }
  #play-again-btn {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: white;
    border: 3px solid #4ade80;
    border-radius: 40px;
    padding: 14px 40px;
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: bold;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 8px;
  }
  #play-again-btn:hover { transform: scale(1.07); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }

  /* ============================================================
     CONFETTI CANVAS
  ============================================================ */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 299;
  }

  /* ============================================================
     MISC DECORATIONS
  ============================================================ */
  .cactus {
    position: absolute;
    bottom: 100%;
    font-size: clamp(1.8rem, 4vw, 3rem);
    z-index: 6;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.2));
  }
  .sign {
    position: absolute;
    z-index: 6;
  }

  /* Shovel tool icon near pit */
  #shovel-icon {
    position: absolute;
    font-size: clamp(1.5rem, 3.5vw, 2.4rem);
    bottom: calc(62% + 4px);
    left: calc(50% - clamp(150px, 28.5vw, 310px) - 10px);
    z-index: 10;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.25));
    transform: rotate(-30deg);
    transition: transform 0.15s;
  }

  /* Feedback toast */
  #toast {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1c1408ee;
    color: var(--accent-gold);
    border: 2px solid var(--accent-gold);
    border-radius: 16px;
    padding: 10px 24px;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    font-weight: bold;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive: single column answers on tiny screens */
  @media (max-width: 380px) {
    #answers-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ============================================================
     GAME SCENE
============================================================ -->
<div id="game-scene">

  <!-- SKY -->
  <div id="sky">
    <div id="sun"></div>
    <div class="cloud" id="cloud1"></div>
    <div class="cloud" id="cloud2"></div>
  </div>

  <!-- GROUND -->
  <div id="ground-surface">
    <div class="grass-strip"></div>
    <div class="dirt-layer-1"></div>
    <div class="dirt-layer-2"></div>

    <!-- Pebbles (decorative) -->
    <div class="pebble" style="width:12px;height:9px;left:15%;top:12%"></div>
    <div class="pebble" style="width:8px;height:6px;left:22%;top:22%"></div>
    <div class="pebble" style="width:10px;height:7px;right:18%;top:15%"></div>
    <div class="pebble" style="width:14px;height:10px;right:10%;top:35%"></div>

    <!-- Cactus decorations -->
    <span class="cactus" style="left:4%;bottom:0">🌵</span>
    <span class="cactus" style="right:5%;bottom:0;font-size:clamp(1.2rem,2.5vw,2rem)">🌵</span>

    <!-- Excavation Pit -->
    <div id="pit">
      <div id="skeleton-container">
        <!-- Bones injected by JS as SVG elements -->
      </div>
    </div>

    <!-- Rock that appears on wrong answer (hidden initially) -->
    <div id="wrong-rock" style="display:none"></div>
  </div>

  <!-- Shovel decoration -->
  <div id="shovel-icon">⛏️</div>

</div><!-- end game-scene -->

<!-- ============================================================
     HUD
============================================================ -->
<div id="hud">
  <div class="hud-pill">⭐ Score: <span id="score-val">0</span></div>
  <button id="restart-btn" onclick="restartGame()">🔄 Restart</button>
</div>

<!-- Progress pips -->
<div id="bones-row" id="bones-row">
  <!-- Filled by JS -->
</div>

<!-- Feedback toast -->
<div id="toast"></div>

<!-- Red flash overlay -->
<div id="wrong-flash"></div>

<!-- Dig animation overlay -->
<div id="dig-overlay"></div>

<!-- ============================================================
     QUESTION MODAL
============================================================ -->
<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-header">
      <span class="modal-icon">🦕</span>
      <div>
        <div class="modal-title">Excavation Challenge</div>
      </div>
      <div class="q-counter" id="q-counter"></div>
    </div>
    <div id="question-text">Loading question...</div>
    <div id="answers-grid">
      <!-- Buttons injected by JS -->
    </div>
  </div>
</div>

<!-- ============================================================
     WIN SCREEN
============================================================ -->
<div id="win-screen" class="hidden">
  <canvas id="confetti-canvas"></canvas>
  <div class="win-dino">🦖</div>
  <div class="win-title">🎉 Dinosaur Completed! 🎉</div>
  <div class="win-sub">You uncovered the full fossil skeleton!</div>
  <div class="win-score">Final Score: <strong><span id="final-score">0</span></strong> pts</div>
  <button id="play-again-btn" onclick="restartGame()">🦴 Dig Again!</button>
</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
/* ============================================================
   QUESTION BANK
   Add more questions here — each needs: question, answers[4], correct (0-3 index)
============================================================ */
const QUESTIONS = [
  {
    question: "Apa warna langit pada siang hari?",
    answers: ["Merah", "Biru", "Hijau", "Hitam"],
    correct: 1,
  },
  {
    question: "Berapa hasil dari 2 + 3?",
    answers: ["4", "6", "5", "7"],
    correct: 2,
  },
  {
    question: "Hewan apa yang bisa terbang dan bertelur?",
    answers: ["Kucing", "Ikan", "Burung", "Kelinci"],
    correct: 2,
  },
  {
    question: "Buah apa yang berwarna kuning dan rasanya manis?",
    answers: ["Apel", "Pisang", "Semangka", "Anggur"],
    correct: 1,
  },
  {
    question: "Ada berapa hari dalam seminggu?",
    answers: ["5 hari", "6 hari", "8 hari", "7 hari"],
    correct: 3,
  },
  {
    question: "Hewan apa yang suka makan wortel dan telinganya panjang?",
    answers: ["Anjing", "Kelinci", "Kuda", "Sapi"],
    correct: 1,
  },
  {
    question: "Apa yang kita pakai untuk menulis di buku?",
    answers: ["Penggaris", "Pensil", "Gunting", "Lem"],
    correct: 1,
  },
  {
    question: "Dinosaurus T-Rex adalah hewan pemakan apa?",
    answers: ["Pemakan rumput", "Pemakan buah", "Pemakan daging", "Pemakan biji-bijian"],
    correct: 2,
  },
];

/* ============================================================
   FOSSIL BONE DEFINITIONS
   8 SVG bones laid out to form a T-Rex skeleton inside the pit
============================================================ */
const BONE_DEFS = [
  // [id, label, SVG path data, x%, y%, width, height, transform]
  { id: 'skull',     label: '💀 Skull',

/* ============================================================
   GAME STATE
============================================================ */
let state = {
  score: 0,
  bonesFound: 0,
  totalBones: BONE_DEFS.length,      // 8
  questionIndex: 0,
  questions: [],                      // shuffled subset
  animating: false,
  gameOver: false,
};

/* ============================================================
   INIT
============================================================ */
function initGame() {
  state.score = 0;
  state.bonesFound = 0;
  state.questionIndex = 0;
  state.animating = false;
  state.gameOver = false;

  // Shuffle questions
  state.questions = shuffle([...QUESTIONS]);

  // Build bones in pit
  buildSkeleton();

  // Build progress pips
  buildPips();

  // Update HUD
  updateHUD();

  // Hide win screen
  document.getElementById('win-screen').classList.add('hidden');

  // Show first question
  showQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ============================================================
   BUILD SKELETON (places all 8 bone pieces, hidden)
============================================================ */
function buildSkeleton() {
  const container = document.getElementById('skeleton-container');
  container.innerHTML = '';
  BONE_DEFS.forEach((bone, i) => {
    const el = document.createElement('div');
    el.className = 'fossil-bone';
    el.id = 'bone-' + bone.id;
    el.style.cssText = `left:${bone.x}; top:${bone.y}; width:${bone.w}px; height:${bone.h}px; position:absolute;`;
    el.innerHTML = `<svg width="${bone.w}" height="${bone.h}" viewBox="0 0 ${bone.w} ${bone.h}" xmlns="http://www.w3.org/2000/svg">${bone.svg}</svg>`;
    container.appendChild(el);
  });
}

/* ============================================================
   BUILD PROGRESS PIPS
============================================================ */
function buildPips() {
  const row = document.getElementById('bones-row');
  row.innerHTML = '';
  for (let i = 0; i < BONE_DEFS.length; i++) {
    const pip = document.createElement('div');
    pip.className = 'bone-pip';
    pip.id = 'pip-' + i;
    pip.title = BONE_DEFS[i].label;
    pip.innerHTML = '🦴';
    pip.style.fontSize = '0';
    row.appendChild(pip);
  }
}

/* ============================================================
   QUESTION MODAL
============================================================ */
function showQuestion() {
  if (state.gameOver) return;

  // Cycle questions if we run out
  const q = state.questions[state.questionIndex % state.questions.length];
  const total = BONE_DEFS.length;
  const remaining = total - state.bonesFound;

  document.getElementById('question-text').textContent = q.question;
  document.getElementById('q-counter').textContent =
    `🦴 ${state.bonesFound}/${total}`;

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';

  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = ans;
    btn.onclick = () => handleAnswer(i === q.correct, btn);
    grid.appendChild(btn);
  });

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

/* ============================================================
   ANSWER HANDLER
============================================================ */
function handleAnswer(correct, btn) {
  if (state.animating) return;
  state.animating = true;

  // Disable all buttons
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  hideModal();

  if (correct) {
    // SOUND_PLACEHOLDER: playSound('correct');
    handleCorrect();
  } else {
    // SOUND_PLACEHOLDER: playSound('wrong');
    handleWrong();
  }
}

/* ============================================================
   CORRECT ANSWER FLOW
============================================================ */
function handleCorrect() {
  state.score += 10;
  updateHUD();
  showToast('✅ Correct! Keep digging!', '#22c55e');

  // Play dig animation then reveal bone
  playDigAnimation(true, () => {
    revealBone(state.bonesFound);
    state.bonesFound++;
    updateHUD();
    updatePips();

    state.questionIndex++;

    setTimeout(() => {
      state.animating = false;
      if (state.bonesFound >= state.totalBones) {
        triggerWin();
      } else {
        showQuestion();
      }
    }, 900);
  });
}

/* ============================================================
   WRONG ANSWER FLOW
============================================================ */
function handleWrong() {
  showToast('❌ Wrong! Just a rock...', '#ef4444');

  // Flash red
  const flash = document.getElementById('wrong-flash');
  flash.classList.remove('flash');
  void flash.offsetWidth; // reflow
  flash.classList.add('flash');

  // SOUND_PLACEHOLDER: playSound('wrong');

  playDigAnimation(false, () => {
    spawnRock();
    state.questionIndex++;

    setTimeout(() => {
      state.animating = false;
      showQuestion();
    }, 900);
  });
}

/* ============================================================
   DIG ANIMATION
============================================================ */
function playDigAnimation(success, callback) {
  const overlay = document.getElementById('dig-overlay');
  overlay.style.display = 'block';
  overlay.innerHTML = '';

  // Pickaxe icon swinging
  const pick = document.createElement('div');
  pick.className = 'pick-anim';
  pick.textContent = '⛏️';
  pick.style.cssText = 'left:48%;top:35%;';
  overlay.appendChild(pick);

  // Dust cloud
  setTimeout(() => {
    for (let i = 0; i < 4; i++) {
      const dust = document.createElement('div');
      dust.className = 'dust';
      const size = 60 + Math.random() * 60;
      dust.style.cssText = `
        width:${size}px; height:${size}px;
        left:${40 + Math.random()*18}%;
        top:${38 + Math.random()*12}%;
        animation-delay:${i*0.08}s;
      `;
      overlay.appendChild(dust);
    }
  }, 250);

  if (success) {
    // Coins
    setTimeout(() => {
      for (let i = 0; i < 6; i++) {
        const coin = document.createElement('div');
        coin.className = 'coin';
        const angle = (Math.PI * 2 / 6) * i;
        const dist = 60 + Math.random() * 40;
        coin.style.cssText = `
          left:calc(50% - 10px);
          top:calc(42% - 10px);
          --dx:${Math.cos(angle)*dist}px;
          --dy:${Math.sin(angle)*dist - 20}px;
          animation-delay:${i*0.05}s;
        `;
        overlay.appendChild(coin);
      }
      // Sparkles
      for (let i = 0; i < 8; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        const angle = (Math.PI * 2 / 8) * i + 0.2;
        const dist = 50 + Math.random() * 60;
        sp.style.cssText = `
          left:calc(${38+Math.random()*24}%);
          top:calc(${35+Math.random()*18}%);
          --sdx:${Math.cos(angle)*dist}px;
          --sdy:${Math.sin(angle)*dist}px;
          animation-delay:${Math.random()*0.2}s;
          width:${6+Math.random()*8}px;
          height:${6+Math.random()*8}px;
        `;
        overlay.appendChild(sp);
      }
    }, 300);
  }

  // Clean up and callback
  setTimeout(() => {
    overlay.style.display = 'none';
    overlay.innerHTML = '';
    callback();
  }, 900);
}

/* ============================================================
   REVEAL BONE
============================================================ */
function revealBone(index) {
  if (index >= BONE_DEFS.length) return;
  const bone = BONE_DEFS[index];
  const el = document.getElementById('bone-' + bone.id);
  if (el) {
    el.classList.add('revealed');
    // SOUND_PLACEHOLDER: playSound('bone_reveal');
  }
}

/* ============================================================
   SPAWN ROCK (wrong answer)
============================================================ */
function spawnRock() {
  const pit = document.getElementById('pit');
  const rock = document.createElement('div');
  rock.className = 'rock-reveal';
  const size = 20 + Math.random() * 20;
  rock.style.cssText = `
    width:${size}px; height:${size * 0.75}px;
    left:${30 + Math.random() * 40}%;
    top:${30 + Math.random() * 35}%;
    position:absolute; z-index:10;
  `;
  pit.appendChild(rock);
  // Remove after 2s
  setTimeout(() => rock.remove(), 2000);
}

/* ============================================================
   PROGRESS PIPS & HUD
============================================================ */
function updatePips() {
  for (let i = 0; i < BONE_DEFS.length; i++) {
    const pip = document.getElementById('pip-' + i);
    if (!pip) continue;
    if (i < state.bonesFound) {
      pip.classList.add('found');
      pip.style.fontSize = '0.65rem';
    } else {
      pip.classList.remove('found');
      pip.style.fontSize = '0';
    }
  }
}

function updateHUD() {
  document.getElementById('score-val').textContent = state.score;
}

/* ============================================================
   TOAST
============================================================ */
let toastTimer;
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color || 'var(--accent-gold)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ============================================================
   WIN / CELEBRATION
============================================================ */
function triggerWin() {
  state.gameOver = true;
  // SOUND_PLACEHOLDER: playSound('win');

  document.getElementById('final-score').textContent = state.score;
  document.getElementById('win-screen').classList.remove('hidden');

  startConfetti();
}

/* ============================================================
   CONFETTI ENGINE (pure canvas, no libs)
============================================================ */
let confettiAnimId;
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const colors = ['#fbbf24','#f59e0b','#22c55e','#16a34a','#ef4444','#ec4899','#818cf8','#fff','#fb923c'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    r: 5 + Math.random() * 9,
    d: 2 + Math.random() * 3,
    color: colors[Math.floor(Math.random()*colors.length)],
    tilt: Math.random() * 10 - 5,
    tiltAngle: 0,
    tiltAngleInc: Math.random() * 0.07 + 0.02,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
  }));

  let tick = 0;
  function drawConfetti() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    tick++;
    pieces.forEach(p => {
      p.tiltAngle += p.tiltAngleInc;
      p.y += p.d;
      p.tilt = Math.sin(p.tiltAngle) * 13;
      p.x += Math.sin(tick / 60) * 0.5;

      ctx.beginPath();
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.arc(p.x, p.y, p.r, 0, 2*Math.PI);
      } else {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.tilt * 0.05);
        ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
        ctx.restore();
        return;
      }
      ctx.fill();

      // Reset fallen pieces
      if (p.y > canvas.height) {
        p.y = -10;
        p.x = Math.random() * canvas.width;
      }
    });
    confettiAnimId = requestAnimationFrame(drawConfetti);
  }
  drawConfetti();
}

function stopConfetti() {
  cancelAnimationFrame(confettiAnimId);
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* ============================================================
   RESTART
============================================================ */
function restartGame() {
  stopConfetti();
  initGame();
}

/* ============================================================
   SOUND PLACEHOLDERS (commented out, add your own audio)
============================================================
function playSound(name) {
  const sounds = {
    correct: new Audio('sounds/correct.mp3'),
    wrong:   new Audio('sounds/wrong.mp3'),
    bone_reveal: new Audio('sounds/reveal.mp3'),
    win:     new Audio('sounds/win.mp3'),
  };
  if (sounds[name]) sounds[name].play();
}
============================================================ */

/* ============================================================
   KICK OFF
============================================================ */
window.addEventListener('load', initGame);
window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti-canvas');
  if (canvas && !document.getElementById('win-screen').classList.contains('hidden')) {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
});
